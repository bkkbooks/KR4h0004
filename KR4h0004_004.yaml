body:
  text: 文選顔鮑謝詩評卷四元方回撰雜詩七月七日夜詠牛女一首謝惠連落日隱櫩楹升月照簾櫳團團滿葉露析析振條風蹀足循廣除瞬目矖曾穹雲漢有靈匹彌年闕相從遐川阻昵愛修渚曠清容弄杼不成藻聳轡騖前蹤昔離秋已兩今聚夕無雙傾河易回斡款顔難久悰沃若靈駕旋寂寥雲幄空留情顧華寢遙心逐奔龍沈吟為爾感情深意彌重虛谷曰世人云七月七日織女嫁牽牛本出齊諧記謂為桂陽城武丁之言無是理也神仙荒唐豫尚未信况又出於一夫之口誣蔑星象虛無妄誕曰此仙者之説而世人信之殊可憫也且星之為物固有飛孛流彗之異此徒見有織女之女字撰造夫婦靈配夜渡天河等事以欺愚俗豈不哀哉玄暉詩推昔離秋已兩今聚夕無雙為詩宗所稱文選注昔離迄今會而秋已兩今聚便别故夕無雙也亦注得好他不過體貼敷衍耳無議論斷此事善乎少陵之詩曰牽牛出河西織女出河東萬古永相望七夕誰見同神光竟難候此事終蒙朧是也然猶曰颯然精靈合何必秋遂通似不謂之全無是理者此少陵力為辨析謂假使有此精靈倐合何必於秋之七夕耶所以力闢之而非以為有也自祈請走兒童以至日出甘所終既哂夫因節乞巧者之愚自嗟汝未嫁女以至丈夫多英雄又所以訓夫臣之於君猶婦之於夫未有私會苟合而可久者此少陵詩所以獨步也然則牛女之説誨淫之薄俗歟搗衣詩一首謝惠連衡紀無淹度晷運倏如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕陰結空幕宵月皓中閨美人戒裳服端飾相招攜簪玉出北房鳴金步南階櫩髙砧響發楹長杵聲哀微芳起兩袖輕汗染雙題紈素既已成君子行未歸裁用笥中刀縫為萬里衣盈篋自余手幽緘候君開腰帶準疇昔不知今是非虛谷曰此詩全在後面八句尤佳則尾句也似當作寄衣以上八句不過賦搗衣而已無佳處又前八句則述秋夜之景而已斗半夜建者衡北斗中一星也冬至日月起於牽牛為星紀故曰衡紀無淹度南樓中望所遲客一首謝靈運杳杳日西頽漫漫長路迫登樓為誰思臨江遲來客與我别所期期在三五夕圓景早已滿佳人猶未適即事怨睽攜感物方悽戚孟夏非長夜晦明如嵗隔瑤華未堪折蘭苕已屢擲路阻莫贈問云何慰離析搔首訪行人引領冀良覿虛谷曰靈運始寧又北轉一汀七里有園南門樓南樓百許步對橫山在今上虞此遲客之所也遲去聲訓待而文選注音訓為思非是江淹擬湯休云日暮碧雲合佳人殊未來不如靈運語意足有來歷初與客期會於月望之夕今月忽圓而客不至所以為佳淹所謂日暮碧雲合豈初以黃昏為期乎故曰不如靈運之語意足也田南樹園激流植援一首謝靈運樵隱俱在山由來事不同不同非一事養疴亦園中中園屏氛雜清曠招逺風卜室倚北阜啓扉面南江激澗代汲井插槿當列墉羣木既羅户衆山亦對窗邐迤趨下岫迢遞瞰髙峯寡欲不期勞即事罕人功唯開蔣生徑永懷求羊蹤賞心不可忘妙善冀能同虛谷曰四句喝起有議論臧榮緒晉書胡孔明有言隱者在山樵者亦在山在山則同所以在山則異靈運則謂吾樵非隱於中園養病而已此所謂在山同所以在山者異也無井也以澗代之無墉也以槿當之羅户之木對窗之山迤邐則趨下岫迢遞則瞰髙峯謂皆出於自然吾本寡欲而得於勞力即此為田園之事而功寡矣其以人力為之者唯開三徑以待賞心之友耳三輔決録蔣詡字元卿隱於杜陵舍中三徑惟羊仲求仲從之遊妙善同出郭象莊子注賞心二字靈運屢用之每篇必然齋中讀書一首謝靈運昔余遊京華未嘗廢丘壑矧乃歸山川心迹雙寂寞虛館絶諍訟空庭來鳥雀卧疾豐暇豫翰墨時間作懷抱觀古今寢食展戲謔既笑沮溺苦又哂子雲閣執戟亦以疲耕稼豈云樂萬事難並歡達生幸可託虛谷曰文選注永嘉郡齋也虛館絶諍訟空庭來鳥雀恐是棄郡事則可豫嘗寓永嘉郡齋近時特為殷盛未易以卧病治也耕稼豈云樂此一句似失言偷一日郡齋之安而笑夫碌碌朝列之人可也謂勝沮溺而耕稼亦在所卑過矣石門新營所住四面髙山回溪石瀨修竹茂林詩一首謝靈運躋險築幽居披雲卧石門苔滑誰能步葛弱豈可捫嫋嫋秋風過萋萋春草繁美人遊不還佳期何由敦芳塵凝瑤席清醑滿金樽洞庭空波瀾桂枝徒攀翻結念屬霄漢孤景莫與諼俯濯石下潭仰看條上猿早聞夕飈急晚見朝日暾崖傾光難留林深響易奔感往慮有復理來情無存庶特乘日車得以慰營魂匪為衆人説冀與智者論虛谷曰詩題止是新築幽居終篇乃屬意所思有美人不來之歎感往慮有復理來情無存此是説道理處然老莊之學不可強以吾儒性命道德通之莊子所謂乘日車郭象亦注不明謂日出而遊日入而息亦不足多窮也數詩一首鮑明逺一身仕關西家族滿山東二年從車駕齋祭甘泉宫三朝國慶畢休沐還舊邦四牡曜長路輕蓋若飛鴻五侯相餞送髙會集新豐六樂陳廣坐組帳揚春風七盤起長袖庭下列歌鐘八珍盈雕俎綺肴紛錯重九族共瞻遲賓友仰徽容十載學無就善宦一朝通虛谷曰此遊戲翰墨如金石絲竹八音建除滿平十二辰角亢氐房二十八宿皆以作難得巧為功非詩之自然者也數者自一至十始云一身仕關西家族滿山東末至十載學無就善宦一朝通緊要意全在此謂寒士之學十載不成巧宦之人一朝通顯如前九韻所云耳玩月城西門廨中一首鮑明逺始見西南樓纖纖如玉鉤末映東北墀娟娟似蛾眉蛾眉蔽珠櫳玉鉤隔瑣窗三五二八時千里與君同夜移衡漢落徘徊帷户中歸華先委露别葉早辭風客遊厭苦辛仕子倦飄塵休浣自公日宴慰及私辰蜀琴抽白雪郢曲發陽春肴乾酒未缺金壺啓夕淪回軒駐輕蓋留酌待情人虛谷曰前六韻言月之自缺而滿又有感於節物之易凋文選注華落向本故曰歸華葉下離枝故曰别葉亦佳後五韻言宦遊休浣偶值此月具琴曲設酒肴當夕漏之云初命駐車以同酌也淪訓波小波曰淪此詩不似晉後宋人詩始出尚書省一首謝玄暉惟昔逢休明十載朝雲陛既通金閨籍復酌瓊筵醴宸景厭照臨昏風渝繼體紛虹亂朝日濁河穢清濟防口猶寬政餐荼更如薺英衮暢人謀文明固天啓青精翼紫軑黃旗映朱邸還覩司隸章復見東都禮中區咸已泰輕生諒昭灑趨事辭宫闕載筆陪旌棨邑里向疏蕪寒流自清泚衰栁尚沈沈凝露方泥泥零落悲友朋歡虞宴兄弟既秉丹石心寧流素絲涕乘此終蕭散垂竿深澗底虛谷曰讀首四句知朓盡齊武帝永明之世立朝十許年次六句痛鬱林次八句美齊明帝稱曰英衮知其咏帝用青精黃旗并光武司隸事則帝有所歸矣海陵為虛位也趨事載筆一聨去尚書省為記室也邑里以下十句乃是因出省而還家朓前賦東田詩有莊在鍾山蓋有退間之意也詩排比多而興趣淺三謝惟靈運詩喜以老莊説道理寫情愫述景則不冗寄意則極怨為特髙云直中書省一首謝玄暉紫殿肅陰陰彤庭赫𢎞敞風動萬年枝日華承露掌玲瓏結綺錢深沈映朱網紅藥當階翻蒼苔依砌上兹言翔鳳池鳴珮多清響信美非吾室中園思偃仰朋情以鬱陶春物方駘蕩安得凌風翰聊恣山泉賞虛谷曰眺嘗轉中書郎此紅藥蒼苔之詩應用者資為事料熟矣實則潘嶽懷縣詩有云清泉過庭激緑槐夾門植信美非吾土秖攪懷歸志此全效之也處省闥而思江湖人能為是言能踐者鮮耳萬年枝今人以為冬青樹承露盤漢武所為江左宫殿無之殆借用耳觀朝雨一首謝玄暉朔風吹飛雨蕭條江上來既灑百常觀復集九成臺空濛如薄霧散漫似輕埃平明振衣坐重門猶未開耳目暫無擾懷古信悠哉戢翼希驤首乘流畏曝鰓動息無兼遂岐路多徘徊方同戰勝者去剪北山萊虛谷曰百常闕出張景陽七命九成臺出吕氏春秋此必省中早坐見雨有驤首之思又有曝鰓之懼動而進乎息而退乎恐熊魚難兼而路分為二莫知適從也如子夏戰紛華而勝則可歸矣亦平郡內登望一首謝玄暉借問下車日匪直望舒圓寒城一以眺平楚正蒼然山積陵陽阻溪流春榖泉威紆距遙甸巉巖帶逺天切切陰風暮桑柘起寒煙悵望心已極惝恍魂屢遷結髮倦為旅平生早事邊誰規鼎食盛寧要狐白鮮方棄汝南諾言稅遼東田虛谷曰寒城一以眺平楚正蒼然朱文公極喜此上一句謂有力唐子西語録謝玄暉詩平楚猶平野也吕延濟乃用翹翹錯薪言刈其楚謂楚木叢便覺氣象殊窘豫所有李善本亦爾近世張雪窗良臣詩秪留平楚伴銷凝豫謂乃極目寒蕪之意平野縱無大草木所以蒼然者蓋亦青青而無極也宣城郡有陵陽山所謂仙人陵陽子明見劉向列仙傳春榖縣在丹陽郡出漢書末句汝南諾下棄字佳謂不能為太守與人畫諾字也遼東田下稅字亦佳牛暴管寧田寧牽牛飼之亦善用事和伏武昌登孫權故城一首謝玄暉炎靈遺劍璽當塗駭龍戰聖期缺中壤霸功興宇縣鵲起登吳山鳳翔陵楚甸襟帶窮巖險帷帟盡謀選北拒溺驂鑣西龕收組練江海既無波俯仰流英盼裘冕類禋郊卜揆崇離殿釣臺臨講閲樊山開廣宴文物共葳蕤聲明且蔥舊三光厭分景書軌欲同薦參差世祀忽寂漠市朝變舞館識餘基歌梁想遺轉故林衰木平荒池秋草遍雄圖悵若兹茂宰深遐眷幽客滯江皋從賞乖纓辨清巵阻獻酬良書限聞見幸藉芳音多承風采餘絢于役儻有期鄂渚同遊衍虛谷曰炎靈遺斬蛇之劍與傳國之璽而吳興日月星三光厭乎分景而書軌欲同也故吳亡凡詩述興盛之事則雅而難為工言及衰亡則哀而易為辭此舞館歌梁故林荒池四句所以讀之而見其佳也伏武昌者伏曼容自大司馬參軍出為武昌太守朓以茂宰稱之太守亦可云茂宰而世人罕用和王著作八公山詩一首謝玄暉二别阻漢坻雙崤望河澳兹嶺復巑岏分區奠淮服東限琅邪臺西距孟諸陸阡眠起雜樹檀欒蔭修竹日隱澗疑空雲聚岫如復出沒眺樓雉逺近送春目戎州昔亂華素景淪伊榖阽危賴宗衮微管寄明牧長蛇固能剪奔鯨自此曝道峻芳塵流業遙年運倏平生仰令圖吁嗟命不淑浩蕩别親知連翩戒征軸再逺館娃宫兩去河陽谷風煙四時犯霜雨朝夜沐春秀良已雕秋場庶能築虛谷曰此詩平平鋪敘琅琊孟諸東限西距泛而不切又誤向背平生仰令圖以下自述兩别家鄉之意以幸苦為歎殊無足觀檀欒蔭修竹一聫處處可用何獨八公山和徐都曹一首謝玄暉宛洛佳遨遊春色滿皇州結軫青郊路回瞰蒼江流日華川上動風光草際浮桃李成蹊徑桑榆陰道周東都已俶載言歸望緑疇虛谷曰文選注和徐都曹勉昧旦出新渚此乃借宛洛以喻建康小詩十句而三句膾炙人口和王主簿怨情一首謝玄暉掖庭聘絶國長門失歡宴相逢詠蘪蕪辭寵悲班扇花叢亂數蝶風簾入雙燕徒使春帶賒坐惜紅糚變生平一顧重宿昔千金賤故人心尚爾故人心不見虛谷曰花叢亂數蝶風簾入雙燕靈運惠連顔延年鮑明逺在宋元嘉中未有此等綺麗之作也齊永明體自沈約立為聲韻之説詩漸以卑而玄暉詩徇俗太甚太工太巧陰何徐庾繼作遂成唐人律詩而晚唐尤纖瑣蓋本原於斯一顧重而千金輕此聫乃絶佳事出列女傳楚成王之夫人鄭子瞀初成王登臺子瞀不顧王曰顧吾與汝千金子瞀遂行不顧為子瞀之不顧千金彼一時也為王嬙陳后班姬見棄於主此一時也杜荀鶴風暖鳥聲碎日髙花影重之句全得此格雜擬擬魏太子鄴中集詩八首謝靈運建安末余時在鄴宫朝遊夕宴究歡愈之極天下良辰美景賞心樂事四者難并今昆弟友朋二三諸彥共盡之矣古來此娛書籍未見何者楚襄王時有宋玉唐景梁孝王時有鄒枚嚴馬遊者美矣而其主不文漢武帝徐樂諸才備應對之能而雄猜多忌豈獲晤言之適不誣方將庶必賢於今日爾嵗月如流零落將盡撰文懷人感往增愴其辭曰魏太子百川赴巨海衆星環北辰照灼爛霄漢遙裔起長津天地中橫潰家王拯生民區宇既滌蕩羣英必來臻忝此欽賢性由來常懷仁況值衆君子傾心隆日新論物靡浮説析理實敷陳羅縷豈闕辭窈窕究天人澄觴滿金罍連榻設華茵急絃動飛聽清歌拂梁塵何言相遇易此歡信可珍王粲家本秦川貴公子孫遭亂流寓自傷情多幽厲昔崩亂桓靈今板蕩伊洛既燎煙函崤沒無像整裝辭秦川秣馬赴楚壤沮漳自可美客心非外奬常歎詩人言式微何由往上宰奉皇靈侯伯咸宗長雲騎亂漢南紀郢皆掃蕩排霧屬盛明披雲對清朗慶泰欲重疊公子特先賞不謂息肩願一旦值明兩並載遊鄴京方舟泛河廣綢繆清宴娛寂寥梁棟響既作長夜飲豈顧乘日飬陳琳袁本初書記之士故述喪亂事多皇漢逢屯邅天下遭氛慝董氏淪關西袁家擁河北單民易周章窘身就羈勒豈意事乖已永懷戀故國相公實勤王信能定蝥賊復覩東都輝重見漢朝則餘生幸已多矧乃值明德愛客不告疲飲宴遺景刻夜聽極星闌朝遊窮曛黑哀哇動梁埃急觴蕩幽默且盡一日娛莫知古來惑徐幹少無宦情有箕潁之心事故仕世多素辭伊昔家臨淄提攜弄齊瑟置酒飲膠東淹留憩髙密此歡謂可終外物始難畢搖蕩箕濮情窮年迫憂栗末塗幸休明棲集建薄質已免負薪苦仍遊椒蘭室清論事究萬美話信非一行觴奏悲歌永夜繫白日華屋非蓬居時髦豈余匹中飲顧昔心悵焉若有失劉楨卓犖偏人而文最有氣所得頗經竒貧居晏里閈少小長東平河兖當衝要淪飄薄許京廣川無逆流招納厠羣英北渡黎陽津南登紀郢城既覽古今事頗識治亂情歡友相解達敷奏究平生矧荷明哲顧知深覺命輕朝遊牛羊下暮坐栝㯮鳴終嵗非一日傳巵弄新聲辰事既難諧歡願如今并唯羡肅肅翰繽紛戾髙冥應瑒汝潁之士流離世故頗有飄薄之歎嗷嗷雲中鴈舉翮自委羽求涼弱水湄違寒長沙渚顧我梁川時緩步集潁許一旦逢世難淪薄恆羇旅天下昔未定託身早得所官渡厠一卒烏林預艱阻晚節值衆賢會同庇天宇列坐廕華榱金樽盈清醑始奏延露曲繼以闌夕語調笑輒酬答嘲謔無慙沮傾軀無遺慮在心良已敘阮瑀管書記之任故有優渥之言河洲多沙塵風悲黃雲起金羈相馳逐聨翩何窮已慶雲惠優渥微薄攀多士念昔渤海時南皮戲清沚今復河曲遊鳴笳泛蘭汜屣步陵丹梯並坐侍君子妍談既愈心哀弄信睦耳傾酤係芳醑酌言豈終始自從食蘋來唯見今日美平原侯植公子不及世事但美遨遊然頗有憂生之嗟朝遊登鳳閣日暮集華沼傾柯引弱枝攀條摘蕙草徙倚窮騁望目極盡所討西顧太行山北眺邯鄲道平衢修且直白楊信裊裊副君命飲宴歡娛寫懷抱良遊匪晝夜豈云晚與早衆賓悉精妙清辭灑蘭藻哀音下回鵠餘哇徹清昊中山不知醉飲德方覺飽願以黃髮期養生念將老虛谷曰序擬曹丕作良辰美景賞心樂事四者難并實靈運語擬為曹丕詩者又云楚襄王時有宋玉唐景梁孝王時有鄒枚嚴馬遊者美矣而其主不文漢武帝徐樂諸才備應對之能而雄猜多忌豈獲晤言之適豫謂此序使其主宋武帝文帝見之皆必切齒其主不文明譏劉裕雄猜多忌亦能誅徐傅謝檀者之所諱也又况言與行皆躁而不靜作為韓亡秦帝之時宋之禪晉自義熙得柄近二十年而篡文帝在位至元嘉十年靈運坐誅其創業三十年矣而以憤辭輕為匡復晉室之語不已疏乎此序亦賈禍之一端也况文帝以文自命鮑昭悟旨偽作才盡僅僅自全靈運誠可謂不智矣所擬八篇於曹丕云天地中橫潰家王拯生民於王粲云排霧屬盛明披雲對清朗此全是晉宋詩建安無此於陳琳云夜聽極星闌朝廷窮曛黑於徐幹云華屋非蓬居時髦豈余匹皆不似建安於劉楨云朝遊牛羊下暮坐栝楬鳴栝楬二字怪詭詩云雞栖于桀牛羊下栝雞棲於􅍻為桀桀與楬音義同栝至也似不必如此立異於應瑒云官渡厠一卒烏林預艱阻頗合實事於阮瑀云河洲多沙塵風悲黃雲起此兩句頗哀壯於曹植云徙倚窮騁望目極盡所討西顧太行山北眺邯鄲道此四句亦髙古然他皆規行矩步甃砌粧點而成無可圈點全無所謂建安風調故豫評其詩而不書其全篇陳琳徐幹阮瑀三子文選無其詩似不似固難懸斷然建安詩有古詩十九首規格晉人至髙莫如阮藉詠懷尚有徑庭靈運山水之作細潤幽怨紆餘開爽則有之矣非建安手也近世有休齋詩話者謂靈運擬鄴中八首無一語可稱誠哉是言今豫於八首之中提出其可資話柄者如前亦已恕矣擬古三首鮑明逺幽并重騎射少年好馳逐氊帶佩雙鞬象弧插雕服獸肥春草短飛鞚越平陸朝遊鴈門上暮還樓煩宿石梁有餘徑驚雀無全目漢虜方未和邊城屢翻復留我一白羽將以分虎竹魯客事楚王懷金襲丹素既荷主人恩又蒙令尹顧日晏罷朝歸鞍馬塞衢路宗黨生光華賓僕逺傾慕富貴人所欲道德亦何懼南國有儒生迷方獨淪誤伐木青江湄設罝守毚十五諷詩書篇翰靡不通弱冠參多士飛步遊秦宫側覩君子論預見古人風兩説窮舌端五車摧筆鋒羞當白璧貺恥受聊城功晚節從世務乘障逺和戎解佩襲犀渠卷􅐆奉盧弓始願力不及安知今所終虛谷曰此三首亦擬古詩十九首如陸機也第一詩惟用二事為博宋景公使弓人為弓九年乃成曰臣之精力盡於此弓景公射之餘力益徑猶飲羽於石梁出闞子吳賀使羿射雀左目誤中右目出帝王世紀詩意欲以一矢求封侯也第二詩設為魯客之譏富貴不以道得南國儒生昭以自謂乃獨迷方失位伐木罝兔而守其愚也第三詩謂少年讀書晚節從戎本非始願不知末路之為如何也然則昭竟有荆州之歿悲夫學劉公幹體一首鮑明逺胡風吹朔雪千里度龍山集君瑤臺裏飛舞兩楹前兹辰自為美當避豔陽年豔陽桃李節皎潔不成妍虛谷曰逴龍山出楚詞兹辰自為美一句佳雪之為物當寒之時則為其美當桃李之時則無所容其皎潔矣物固各有一時之美也代君子有所思一首鮑明逺西出登雀臺東下望雲闕層閣肅天居馳道直如髮繡甍結飛霞璇題納行月築山擬蓬壺穿池類溟渤選色遍齊代徴聲匝卭越陳鐘陪夕宴笙歌待明發年貌不可還身意會盈歇蟻壤漏山河絲淚毀金骨器惡含滿欹物忌厚生沒智哉衆多士服理辨昭昧虛谷曰此詩十韻前述帝居皇闕之盛而後嘆其忽衰雍門子感孟嘗君之意也築山擬蓬壺穿池類溟渤選色遍齊代徴聲匝卭越其盛如此蟻壤漏山河絲淚毀金骨器惡含滿欹物忌厚生沒一朝有不可測者則衰矣一蟻之孔可以傾山潰河一絲之淚可以鑠金銷骨欹器滿則覆出家語生之厚而之死地出莊子詩意本亦常談但造語峭拔而世之冨貴驕淫不戒以顛者比比是也則其言豈可忽諸
