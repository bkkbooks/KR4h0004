body:
  text: 文選顔鮑謝詩評巻三元方回撰行旅永初三年七月十六日之郡初發都一首謝靈運述職期䦨暑理棹變金素秋岸澄夕隂火旻團朝露辛苦誰為情遊子值頹暮愛似莊念昔久敬曾存故如何懐土心持此謝逺度李牧愧長袖郤克慙躧歩良時不見遺醜狀不成惡曰余亦支離依方早有慕生幸休明世親蒙英逹顧空班趙氏璧徒乖魏王瓠從來漸二紀始得傍歸路將窮山海迹未絶賞心晤虚谷曰諸侯朝於天子曰述職然漢書王吉傳云召公述職舍於棠下而聽斷則諸侯治事亦曰述職可也靈運本期夏末視郡事而秋乃成行也見似人而喜出莊子久友交而中絶曾子以為三費出韓詩外傳靈運不勝去國之懐故用此三事以寓念昔存故之意不但悵然於廬陵義真也李牧臂短為木杖接手晉郤克跛而登階齊婦人笑之出戰國䇿左傳支離疏形體不全孔子遊方之内方常也依常教也並出莊子靈運用此四事自况於醜惡疾病之列而亦不敢自畔於禮法猶幸而不見棄於明時也相如以趙璧為瑕恵子以魏瓠為無用靈運又用此二事謂英達之顧雖荷義真出為外郡徐傅見擠珍非趙璧而棄如魏瓠也從來漸二紀始得傍歸路想靈運去㑹稽始寧出仕踰二十餘年今乃因作郡而過家也将窮山海迹未絶賞心晤自是佳句然其義専在義真義真於靈運嘗云未能忘言於悟賞而靈運終身亦有賞心永絶之歎此詩排比整密建安諸子混然天成不如此陶淵明剥落枝葉不如此但當以三謝詩觀之則靈運才高詞富意愴心怛亦未易涯涘也過始寧墅一首謝靈運束髪懐耿介逐物遂推遷違志似如昨二紀及兹年緇磷謝清曠疲苶慙貞堅拙疾相依薄還得静者便剖竹守滄海枉㠶過舊山山行窮登頓水涉盡洄㳂岩峭嶺稠叠洲縈渚連緜白雲抱幽石緑篠媚清漣葺宇臨廻江築觀基曾巔揮手告鄉曲三載期歸旋且為樹枌檟無令孤願言虚谷曰詩有形有脉以偶句叙事述景形也不必偶而必立論盡意脉也古詩不必與後世律詩不同要當以脉為主如此詩剖竹守滄海以下五聨十句皆偶未為竒也前八句不偶則有味矣束髪懐耿介當是年十五而渉世倐復二紀則三十嵗矣沈約宋書靈運全傳内有山居賦注俟考拙與疾相迫而後得遂静者之志静者詩家多用本於論語仁者静但未詳用静者二字誰為祖耳此所以述出處本末也期約鄉曲三載而歸俾樹枌檟無孤始願此繳句又自有味靈運欲書滿郡考後乃一年移疾去職盖其家温有餘無資於禄惜乎才髙氣鋭積以不參時政為恨遂致顛沛云始寧縣今上虞之南鄉苶奴結切富春渚一首謝靈運宵濟漁浦潭旦及富春郭定山𬗟雲霧赤亭無淹薄遡流觸驚急臨圻阻參錯亮乏伯昬分險過吕梁壑洊至宜便習兼山貴止託平生協幽期淪躓困微弱久露干禄請始果逺遊諾宿心漸申寫萬事俱零落懐抱既昭曠外物徒龍蠖虚谷曰靈運歸㑹稽始寧墅從今漁浦泝富陽赴永嘉也定山赤亭今如故伯昏吕梁二事以言浙江之險坎之水洊至習乎險者也艮之兼山貴乎止也久露干禄請始果逺遊諾謂久有補郡之請今得永嘉而遂逺遊之願也宿心漸申寫即所謂幽期者無可乖矣萬事俱零落一句怨辭也志欲與廬陵有所為雖未必曾有宰相之許而襟期不淺既為徐傅所擠則從前規度之事俱無復望也其怨深矣龍蠖之屈以求伸此謂心事明白如爵禄外物聽其可有可無也細味之靈運實未能忘情於世故如此作以詩法論之若無平生協幽期以下八句議論前十句鋪叙而已七里瀨一首謝靈運羇心積秋晨晨積展遊眺孤客傷逝湍徒旅苦奔峭石淺水潺湲日落山照曜荒林紛沃若哀禽相叫嘯遭物悼遷斥存期得要玅既秉上皇心豈屑末代誚目覩嚴子瀨想屬任公釣誰謂古今殊異代可同調虚谷曰文選注桐廬有七里瀨下數里至嚴陵瀨予作郡七年往來屢矣今人皆混而言之任公之釣志其大而不志其小故所得者大予謂此寓言非所以擬嚴子遷斥者推移之義非謂遷謫也登江中孤嶼一首謝靈運江南倦厯覽江北曠周旋懐新道轉迥尋異景不延亂流趨正絶孤嶼媚中川雲日相輝映空水共澄鮮表靈物莫賞藴真誰為傳想像崐山姿𬗟邈區中縁始信安期術得盡養生年虚谷曰此今永嘉郡江心寺無疑予三十年前甲寅乙卯寓郡齋往遊見徐靈暉流來天際水截斷世間塵詩牌不見此詩至今永嘉稱為中川者因此詩也孤嶼媚中川媚字句中眼也懐新道轉迥此句尤佳心有不純去道愈逺但恐靈運道其所道耳尋異景不延異字可疑雲日空水之聨亦佳表靈藴真一聨似乎深奥然從此説向神仙上去則所謂靈與真者仙也故於孤嶼之上想夫崐崘山之神而有信於安期生之術安期瑯琊阜鄉人秦始皇東㳺與語三日三夜者西王母者崑崙之神初去郡一首謝靈運彭薛裁知恥貢公未遺榮或可優貪競豈足稱達生伊子秉微尚拙訥謝浮名廬園當栖巖卑位代躬耕顧已雖自許心迹猶未并無庸妨周任有疾像長卿畢娶類尚子薄游似邴生恭承古人意促裝返柴荆牽絲及元興解龜在景平負心二十載於今廢將迎理棹遄還期遵渚騖修坰遡溪終水涉登嶺始山行野曠沙岸淨天髙秋月明憩石挹飛泉攀林搴落英戰勝臞者肥止監流歸停即是羲唐化獲我擊壤情虚谷曰牽絲及元興初仕解龜在景平謂去郡晉安帝初改隆安至五年而改元元興是年三月桓𤣥入京師二年十一月𤣥簒晉三年二月劉裕起兵四月𤣥伏誅明年改元義熈三月安帝還京師自此盡十四年恭帝改元元熈盡一年明年六月劉裕簒晉改元熈二年為永初元年盡三年少帝改元景平明年文帝入改永平二年為元嘉元年自元興之元至景平之元凡二十三年靈運初以襲康樂公除散騎常侍不就此牽絲之始也得非桓𤣥未反之先乎其為瑯琊王大司馬參軍此則在反正之後無疑中間遷太子左衛率次沈約宋書細考永初三年秋出為永嘉太守景平元年秋謝病去職作此詩以彭宣薛廣徳貢禹為不足以周任司馬長卿尚子平邴曼容自擬刋本妨周任决非妨字非倣字即方字倣像類似四字一義故也或問予野曠沙岸浄天高秋月明以筆圈之良是遡溪終水渉登嶺始山行㸃之則何義邪曰此於永嘉去郡如畫也永嘉城下泝潮江過青田縣抵處州始舍舟登馮公嶺出永康東陽非嘗至其地不知也文選注戰勝明貴不如義止監明語不如黙所注甚佳戰勝而肥子夏事出韓子莫監流水而監於止水出文中子擊壤事出莊子論衡周處風土記初發石首城一首謝靈運白珪尚可磨斯言易為緇雖抱中孚爻猶勞貝錦詩寸心若不亮微命察如絲日月垂光景成貸遂兼兹出宿薄京畿晨装摶曾颸重經平生别再與朋知辭故山日已逺風波豈還時苕苕萬里㠶茫茫終何之遊當羅浮行息必廬霍期越海陵三山遊湘歴九嶷欽聖若旦暮懐賢亦悽其皎皎明發心不為嵗寒欺虚谷曰中孚貝錦之聨甚佳微命察如絲察字尤佳老子曰夫惟道善貸與善成貸施也靈運感文帝之宥已故以日月喻之舊説㑹稽之浮山合於廣東之羅山廬山在今江州霍山灊皖是在今舒州三山海中九嶷湘中靈運方當治郡畧不及理人宣化事專言㳺山意太汗漫無歸宿萬世之後一遇大聖知其解者是旦暮遇之出莊子晉人老莊之學初用為清談之資而詩亦必出於是一時之蔽也道路憶山中一首謝靈運采菱調易急江南歌不緩楚人心昔絶越客腸今斷斷絶雖殊念俱為歸慮款存鄉爾思積憶山我憤懣追情栖息時偃卧任縱誕得性非外求自已為誰纂不怨秋夕長常苦夏日短濯流激浮湍息隂倚密竿懐故叵新歡含悲忘春㬉悽悽明月吹惻惻廣陵散殷勤訴危柱慷慨命促管虛谷曰楚詞有云涉江采菱古樂府有江南辭靈運時必有此二曲其聲急而怨故引之以見故山之思有感於此聲也縱誕之説非是得性非外求謂樂在内是也吹萬不同而使其自巳已訓止言各得其性而止出莊子靈運意謂山水之樂適我之性而自足自止無人能繼我者纂訓繼則亦深僻矣明月吹言笛廣陵散言琴靈運當是作此音以寫悲怨危柱促管謂琴笛之音自緩而急悲怨至此極也詩尾應首然有哀以思之意未為佳篇入彭蠡湖口一首謝靈運客遊倦水宿風潮難具論洲島驟迴合圻岸屢崩奔乗月聽哀狖浥露馥芳蓀春晩緑野秀巖髙白雲屯千念集日夜萬感盈朝昏攀崖照石鏡牽葉入松門三江事多往九派理空存靈物吝珍怪異人祕精魂金膏滅明光水碧綴流温徒作千里曲絃絶念彌敦虚谷曰彭蠡湖口今江州湖口也石鏡松門文選注張僧鍳尋陽記顧野王輿地志各指其地惟三江事多往九派理空存此二句者知三江九江自晉宋時已不明矣中江南江北江先儒所辨有尚書索𤣥在分九派於尋陽郭璞江賦云耳後人亦不能定九派之迹劉子澄淳祐江州圗經詳著之予已别書訂此詩則靈運之所不詳後人姑存疑事也靈物異人以下又歸宿於仙道千里曲想當時有此琴操徒作此曲而仙靈不接所以弦雖絶而心徒悲也大抵以恍惚為宗要為不近人情胸中亦别無十分道理也入華子崗是麻源第三谷一首謝靈運南州實炎徳桂樹凌寒山銅陵映碧澗石磴㵼紅泉既枉隠淪客亦棲肥遁賢險逕無測度天路非術阡遂登羣峰首邈若升雲煙羽人絶髣髴丹丘徒空筌圖牒復磨滅碑版誰聞傳莫辨百世後安知千載前且申獨往意乘月弄潺湲恒充俄頃用豈為古今然虚谷曰華子期角里弟子見列仙傳故老相傳翔集此頂故稱華子岡神仙茫昧前後莫測且申獨往意夫獨往者聊以自充俄頃之賞非為尊古卑今而然也北使洛一首顔延年改服飭徒旅首路跼險艱振楫發吳洲秣馬陵楚山塗出梁宋郊道由周鄭間前登陽城路日夕望三川在昔輟期運經始濶聖賢伊榖絶津濟臺館無尺椽宫陛多巢穴城闕生雲煙王猷升八表嗟行方暮年隂風振涼野飛雲瞀窮天臨塗未及引置酒慘無言隠憫徒御悲威遲良馬煩遊役去芳時歸來屢徂諐蓬心既已矣飛薄殊亦然虚谷曰文選注沈約宋書曰延之為豫章世子中軍行參軍義熈十二年髙祖北伐有宋公之授府遣一使慶殊命參起居延之至洛陽道中作詩一首文辭藻麗為謝晦傅亮所賞集曰時年三十二予味此詩人所可及所以書此詩者有二東晉五國一百四年義熈十二年恰一百年足也後四年而劉裕禪洛陽自惠帝朝䘮亂迄于懐愍蒙塵百餘年丘墟延之三川之詠謂伊瀔絶津濟臺館無尺椽予存此所以考時論事也義熈十二年延之年三十二元初三年出為始安太守當年三十八元嘉三年入為中書侍郎當年四十二元嘉十年有湖北田收詩當年四十九是年謝靈運誅至元嘉二十六年有京口蒜山後湖詩則年六十六矣孝武登阼為金紫光禄大夫領湘東王師則七十餘矣予存此所以考年論人也又因而論之陶淵明元嘉四年卒年六十三延之為劉栁後軍功曹在潯陽與淵明情欵後為始安郡經過淵明每往必酣飲致醉臨去留二萬錢與淵明淵明悉送酒家觀此乃知延之詩雖不及靈運其胸次則過之靈運嘗入廬山不為逺法師所與亦不聞其見交於淵明延之獨與淵明交好甚深以年計之永初三年淵明年五十八矣長延之二十嵗亦可謂忘年之交也延之後作靖節徴士誄書曰有晉徴士雖出於衆志而延之實秉易名之筆其知淵明盖深也違衆迷尤迕風光蹶身才非實榮聲有歇延之誄書淵明所誨如此又書淵明獨立者危至方則礙語其有得淵明也多矣故曰詩雖不及靈運其胷次則過之還至梁城作一首顔延年眇黙軌路長憔悴征戍勤昔邁先徂師今來後歸軍振策睠東路傾側不及羣息徒顧將夕極望梁陳分故國多喬木空城凝寒雲丘隴填郛郭銘誌滅無文木石扃幽闥黍苖延髙墳惟彼雍門子吁嗟孟嘗君愚賤同堙滅尊貴誰獨聞曷為久游客憂念坐自殷虚谷曰此詩十韻故國多喬木空城凝寒雲丘壟填郛郭銘誌滅無文木石扃幽闥黍苖延髙墳惟彼雍門子吁嗟孟嘗君愚賤同湮滅尊貴誰獨聞亦通論也但不可及耳始安郡還都與張湘州登巴陵城樓作一首顔延年江漢分楚望衡巫奠南服三湘淪洞庭七澤藹荆牧經途延舊軌登闉訪川陸水國周地險河山信重複却倚雲夢林前瞻京臺囿清雰霽岳陽曾暉薄瀾澳悽矣自逺風傷哉千里目萬古陳往還百代勞起伏存沒竟何人炯介在明淑請從上世人歸來蓺桑竹虚谷曰此詩十韻江漢分楚望荆巫奠南服三湘淪洞庭七澤藹荆牧起句二韻大槩言地勢郊外曰牧荆牧言七澤之野也末韻請從上世人歸來蓺桑竹有感於存沒竟何人炯介在明淑而云初不明言炯介眀淑為進為退而為松竹之句則意在退也還都道中作一首鮑明逺昨夜宿南陵今旦入蘆洲客行惜日月崩波不可留侵星赴早路畢景逐前儔鱗鱗夕雲起獵獵曉風遒騰沙鬱黄霧翻浪揚白鷗登艫眺淮甸掩泣望荆流絶目盡平原時見逺煙浮倐悲坐還合俄思甚兼秋未嘗違户庭安能千里游誰令乏古節貽此越鄉憂虚谷曰此詩尾句絶佳守古人之節不輕出仕則焉得有越鄉之憂乎前段皆江路曉行暮宿之意之宣城出新林浦向版橋一首謝𤣥暉江路西南永歸流東北騖天際識歸舟雲中辨江樹旅思倦揺揺孤游昔已屢既懽懐禄情復協滄洲趣囂塵自兹隔賞心於此遇雖無𤣥豹姿終隠南山霧虚谷曰天際識歸舟雲中辨江樹古今絶唱江路西南永今大江上水指西南行而南為多歸流東北騖今下水即東北行而北為多之宣城即上水𤣥暉家於浙則東北乃其歸路上水用東北風下水用西南風此二句又似指定江流之勢古今不可易也得郡而兼得山水之樂於永嘉臨川則靈運於宣城則𤣥暉而𤣥暉至今專謝宣城之名云板橋名今猶存晉宋時乃浮橋敬亭山詩一首謝𤣥暉兹山亘百里合沓與雲齊隠淪既已託靈異居然棲上干蔽白日下屬帯迴谿交藤荒且蔓樛枝聳復低獨鶴方朝唳饑鼯此夜啼渫雲已漫漫多雨亦凄凄我行雖紆組兼得尋幽蹊緣源殊未極歸徑窅如迷要欲追竒趣即此陵丹梯皇恩竟已矣兹理庶無睽虚谷曰此詩妙在何處亦本無妙而𤣥暉詩名與敬亭山千古不朽何也學者試下一轉語休沐重還道中一首謝𤣥暉薄游苐從告思閒願罷歸還邛歌賦似休汝車騎非灞池不可别伊川難重違汀葭稍靡靡江菼復依依田鶴逺相呌沙鴇忽爭飛雲端楚山見林表吳岫微試與征徒望鄉淚盡霑衣賴此盈罇酌含景望芳菲問我勞何事霑沐仰清㣲志狹輕軒冕恩甚戀重闈嵗華春有酒初服偃郊扉虚谷曰薄遊於朝本孫綽語謂立朝僅許給假故曰薄遊苐從告漢書五日得一休沐休者假也沐者洗也願罷歸而僅賜休沐也司馬相如還臨邛諭蜀而歸也嘗奏賦漢武故𤣥暉以為似之袁紹以濮陽令歸汝南不敢以輿服令許子將見單車歸家𤣥暉無此車徒故曰非也此二句極佳長安之霸池洛陽之伊川借喻京師以言戀闕之意楚山吳岫二句亦佳𤣥暉家吳中嘗有詩曰再遊館娃宫是也末句謂志輕軒冕而君恩之至則又有禁闥之戀重闈謂宫省也最後句終期退閒其思緩而不迫尤有味也晩登三山還望京邑一首謝𤣥暉灞涘望長安河陽視京縣白日麗飛甍參差皆可見餘霞散成綺澄江浄如練喧鳥覆春洲雜英滿芳甸去矣方滯淫懐哉罷歡宴佳期悵何許淚下如流霰有情知望鄉誰能縝不變虚谷曰起句以長安洛陽擬金陵用王粲潘岳二詩極佳李白云解道澄江浄如練令人却憶謝𤣥暉此一聨尤佳也三山今猶如故回望建康甚近想六朝時甚盛也味末句其惓惓於京邑如此去國望鄉其情一也有情無不知望鄉之悲而况去國乎京路夜發一首謝𤣥暉擾擾整夜裝肅肅戒徂兩曉星正寥落晨光復泱漭猶霑餘露團稍見朝霞上故鄉邈已夐山川修且廣文奏方盈前懐人去心賞敕躬毎跼蹐瞻恩唯震蕩行矣倦路長無由税歸鞅虚谷曰此乃早行詩兩車也徂兩二字甚佳樂府㑹吟行謝靈運六引緩清唱三調佇繁音列筵皆静寂咸共聆㑹吟㑹吟自有初請從文命敷敷績壺冀始刋木至江汜列宿炳天文負海横地理連峰競千仞背流各百里滮池溉粳稻輕雲曖松把兩京愧佳麗三都豈能似層臺指中天髙墉積崇雉飛燕躍廣途鷁首戲清沚肆呈窈窕容路曜便娟子自來彌年代賢逹不可紀句踐善廢興越叟識行止范蠡出江湖梅福入城市東方就旅逸梁鴻去桑梓牽綴書土風辭殫意未已虚谷曰文選不注㑹吟行之義詳考乃是傚陸機呉趍行崔豹古今注曰吳趍曲吳人以歌其地也今曰㑹吟非呉㑹之㑹即㑹稽之㑹今兩浙秦之㑹稽郡漢之呉郡也陸機之作曰楚妃且莫歎齊娥且莫謳四坐並清聽聽我歌呉趍呉趍自有始請從昌門起以下十四韻皆述呉中風土人物靈運之作起句三韻同調以下少一韻耳鋪叙誇張别無髙意皆不可謂之佳作六引三調文選注亦不詳明所引呉越六人所謂越叟者出越絶書子胥戰於檇李闔閭軍敗欲復其讎師事越公録其術又非范蠡其人他書未嘗見東方朔就旅逸出劉向列仙傳謂宣帝時棄郎去避亂政置幘官舍風飄之去後見㑹稽賣藥漢書無此事餘四人史可考樂府詩八首鮑明逺東武吟主人且勿諠賤子歌一言僕本寒鄉士出身蒙漢恩始隨張校尉占募到河源後逐李輕車追虜窮塞垣密塗亘萬里寧嵗猶七奔肌力盡鞍甲心思歴涼温將軍既下世部曲亦罕存時事一朝異孤績誰復論少壯辭家去窮老還入門腰鎌刈葵藿倚杖收雞㹠昔如韝上鷹今似檻中猿徒結千載恨空負百年怨棄席思君幄疲馬戀君軒願垂晉主恵不愧田子魂虚谷曰此早從軍而晩無成者晉文公捐籩豆棄席蓐舅犯夜哭出韓子田子方贖老馬事出韓詩外傳能垂晉主之恵則能不愧於田子之神矣而後世之不願棄席老馬者衆矣東武地本太山當吟齊之土風今照用題不拘恐謂東武之人應募亦可詩有筆力如轉石下千仞山衮衮轟轟不可禦李太白詩甚似之出自薊北門行羽檄起邊亭烽火入咸陽徴騎屯廣武分兵救朔方嚴秋筋竿勁虜陣精且彊天子按劍怒使者遥相望雁行緣石徑魚貫度飛梁簫鼓流漢思旌甲被胡霜疾風衝塞起沙礫自飄揚馬毛縮如蝟角弓不可張時危見臣節世亂識忠良投軀報明主身死為國殤虚谷曰此全用楚詞國殤之意身既飛兮神以靈魂魄毅兮為鬼雄張巡嚼齒穿齦之類是也西京雜記元封二年大雪深五尺牛馬踡縮如蝟少陵詩漢時長安雪一丈牛馬寒毛縮如蝟鮑用又在先也結客少年場行驄馬金絡頭錦帯佩呉鈎失意杯酒間白刃起相讐追兵一旦至負劍逺行遊去鄉三十載復得還舊丘升髙臨四關表裏望皇州九塗平若水䨇闕似雲浮扶宫羅將相夾道列王侯日中市朝滿車馬若川流擊鐘陳鼎食方駕自相求今我獨何為坎壈懐百憂虚谷曰此謂俠少晩而悔者朱家郭解之徒終貽悔吝况區區殺人亡命子乎可以為戒也此詩專指洛陽四關者東成臯南伊闕北孟津西函谷䨇闕者南北宫乃秦始皇所創九塗平若水䨇闕似雲浮此亦古詩蹉對句法東門行傷禽惡弦驚倦客惡離聲離聲斷客情賓御皆涕零涕零心斷絶將去復還訣一息不相知何况異鄉别遥遥征駕逺杳杳落日晩居人掩閨卧行子夜中飯野風吹秋木行子心腸斷食梅常苦酸衣葛常苦寒絲竹徒滿坐憂人不解顔長歌欲自慰彌起長恨端虚谷曰此專言離别之難詩四折為二韻三韻各二折味至末句則凡中有憂者雖合樂也而愈悲雖長歌也而愈怨不特離别也虚弓落鴈事出戰國策更嬴於魏王射者盖寓言設譬此所謂傷禽惡弦驚也苦熱行赤阪横西阻火山赫南威身熱頭且痛鳥墮魂來歸湯泉發雲潭焦煙起石圻日月有恒昏雨露未嘗晞丹蛇踰百尺𤣥蜂盈十圍含沙射流影吹蠱痛行暉鄣氣晝熏體菵露夜沾衣飢猿不下食晨禽不敢飛毒涇尚多死渡瀘寜具腓生軀蹈死地昌志登禍機戈舩榮既薄伏波賞亦微財輕君尚惜士重安可希虚谷曰熱者地之至惡死者事之至難蹈至惡之地責以至難之事而上之人不察則天下士有去之而已君視臣如草芥則臣視君如寇讎此詩連以十六句言苦熱一句用一事富哉言乎毒涇渡瀘始入議論謂所住之地甚於秦人之毒涇諸葛之渡瀘死地禍機决無可全之理而軍賞微薄則必失天下之心矣韓詩外傳田饒對宋燕語財者君所輕死者士所重君不能用所輕欲使士致重乎白頭吟直如朱絲繩清如玉壺冰何慙宿昔意猜恨坐相仍人情賤恩舊世議逐衰興毫髮一為瑕丘山不可勝食苗實碩䑕玷白信蒼蠅鳬鵠逺成美薪芻前見陵申黜褎女進班去趙姬昇周王日淪惑漢帝益嗟稱心賞猶難恃貌恭豈易憑古来共如此非君獨撫膺虚谷曰司馬相如欲聘茂陵女卓文君為白頭吟此用其題而廣之也沈約宋書古白頭辭曰凄凄重凄凄嫁女不湏啼願得一心人白頭不相離廣其意則不止夫婦間也此詩可謂遒麗俊逸黄鵠所從來逺而貴之雞所從來近而日􅀈之韓詩外傳田饒語魯哀公者譬若薪燎後者處上文子語亦汲黯語盖逺近前後之説也心賞貌恭一聨至佳至佳放歌行蓼蟲避葵堇習苦不見非小人自齷齪安知曠士懐雞鳴洛城裏禁門平旦開冠盖縱横至車騎四方來素帯曳長飈華纓結逺埃日中安能止鐘鳴猶未歸夷世不可逢賢君信愛才明慮自天斷不受外嫌猜一言分珪爵片善辭草萊豈伊白璧賜將起黄金臺今君有何疾臨路獨遲廻虚谷曰此詩之意全在夷世不可逢賢君信愛才四句謂明君在上可以仕矣一言片善可致冨貴豈徒取虞卿之白玉璧又將起郭隗之黄金臺而不急於仕者果何所病而不進乎起句用蓼蟲避葵蓳事楚辭云蓼蟲不徙乎葵藿言性不遷也世間以苦為甘以臭為香者固有之然士之處世果逢明君何為不仕苟有一之未然則不如蓼蟲之安於苦也升天行家世宅關輔勝帶宦王城備聞十帝事委曲兩都情倦見物興衰驟覩俗屯平翩翻類逥掌恍惚似朝榮窮塗悔短計晩志重長生從師入逺岳結友事僊靈五圗發金記九籥隠丹經風餐委松宿雲卧恣天行冠霞登綵閣解玉飲椒庭蹔遊越萬里近别數千齡鳳臺無還駕簫管有遺聲何時與爾曹啄腐共吞腥虚谷曰厭世故而求神仙神仙果有之乎張子房願從赤松子遊以全功名也梅福去為吳市卒人以為仙以避亂也未必真有所謂升天者也蘇子由評李白詩語用兵則先登陷陣不以為難語遊俠則白晝殺人不以為非予以鮑明逺詩輒續之曰語神仙則白日升天不以為無若從尾句之意則寓言借喻君子有髙志逺意㧞出塵埃之表者視世之卑汚苟賤之人直如禽蟲之吞啄腐腥耳五圗九籥據文選注引抱朴子五嶽真形圗鄭𤣥易緯注齊魯間藏器之管曰籥又以藏經丹有九轉鼔吹曲謝𤣥暉江南佳麗地金陵帝王州逶迤帯渌水迢逓起朱樓飛甍夾馳道垂楊䕃御溝凝笳翼髙葢疊鼓送華輈獻納雲臺表功名良可收虚谷曰文選注奉隋王教作鼓吹歌軍樂也謂之短簫鐃歌黄帝岐伯所作又古入朝曲吳録張紘語秣陵楚武王所置名為金陵秦始皇時望氣者云金陵有王者氣故斷連岡改名秣陵曹植詩壯哉帝王居佳麗殊百城𤣥暉此二句響人牙頰後四句亦熟為人所誦徐引聲謂之凝小擊鼓謂之疊
