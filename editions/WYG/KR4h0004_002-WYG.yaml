body:
  text: 文選顔鮑謝詩評巻二元方囘撰詠懷秋懷詩一首謝惠連平生無志意少小嬰憂患如何乗苦心矧復值秋晏皎皎天月明奕奕河宿爛蕭瑟含風蟬寥戾度雲鴈寒商動清閨孤燈曖幽幔耿介繁慮積展轉長宵半夷險難豫謀倚伏昧前算雖好相如達不同長卿慢頗悦鄭生偃無取白衣宦未知古人心且從性所翫賓至可命觴朋來當染翰髙臺驟登踐清淺時陵亂頽魄不再圓傾羲無兩旦金石終銷毁丹青蹔彫煥各勉𤣥髪歡無貽白首歎因歌遂成賦聊用布親串虚谷曰蔡寛夫詩話謂晉宋間詩人有一人名而分用之者如劉越石宣尼愬獲麟西狩泣孔丘謝惠連雖好相如達不同長卿慢等語若非前後相映帶殆不可讀予謂唐初猶有此風李延壽南史恩倖傳有云謀於管仲齊桓有召陵之師邇於易牙小白掩陽門之扇此亦可笑者也於司馬相如長卿取其達而不取其慢於鄭均仲虞取其乞骸告歸而受尚書禄有白衣尚書之號則所不取意本自佳長卿慢係押韻慢字有來厯嵇康髙士傳讃曰長卿慢世此文選注有益後學者如此金石終銷毁丹青蹔彫煥此十字極佳丹青謂圖形哀傷廬陵王墓下作一首謝靈運曉月發雲陽落日次朱方含悽泛廣川灑淚眺連崗眷言懷君子沉痛結中腸道消結憤懣運開申悲涼神期恒若在德音初不忘徂謝易永乆松栢森已行延州協心許楚老惜蘭芳解劍竟何及撫墳徒自傷平生疑若人通蔽互相妨理感深情慟定非識所將脆促良可哀夭枉特兼常一隨徃化滅安用空名揚舉聲泣已灑長歎不成章虚谷曰道消謂義眞被殺則以鬱結憤懣運開謂文帝既立可以申冩悲涼通蔽本桓譚語論漢髙者今用之以明季札之於徐君楚老之於龔勝解劒惜蘭舉措異常若通人之蔽者然今日之慟情理如此則知昔人之非蔽也靈運詩此篇未為致佳拜陵廟作一首顔延年周德恭明祀漢道尊光靈哀敬隆祖廟崇樹加園塋逮事休命始投迹階王庭陪厠迴天顔朝讌流聖情早服身義重晩達生戒輕否來王澤竭泰徃人悔形敕躬慙積素復與昌運并恩合非漸漬榮會在逢迎夙御嚴清制朝駕守禁城束紳入西寢伏軫出東坰衣冠終㝠漠陵色轉葱青松風遵路急山煙冒壠生皇心憑容物民思被歌聲萬紀載絃吹千載託旒旌未殊帝世逺已同淪化萌幼壯困孤介末暮謝幽貞發軌喪夷易歸軫愼﨑傾虚谷曰此詩十七韻松風遵路急山煙冐壠生兩句平平是處可用他切題處冗而晦無可書葢從宋文帝上髙祖塜也同謝諮議銅雀臺詩一首謝𤣥暉繐帷飄井幹罇酒若平生鬱鬱西陵樹詎聞歌吹聲芳襟染淚迹嬋媛空復情玉座猶寂寞况迺妾身輕虚谷曰文選注謝諮議璟銅雀臺曹操建安十五年作於鄴都遺令吾伎人皆著臺上施六尺牀繐帳朝晡上脯糒之屬月朔十五日輒向帳作伎汝等時時登臺望吾墓田予謂此乃後人事靈筵之禮布細而疎謂之繐南陽有鄧繐幹音寒井欄臺之通稱西陵樹豈能聞歌聲葢指操也楚辭嬋媛王逸訓為牽引今人誤作嬋娟非是贈荅荅靈運一首謝宣逺夕霽風氣涼閒房有餘清開軒滅華燭月露皓已盈獨夜無物役寢者亦云寧忽獲愁霖唱懷勞奏所成歎彼行旅艱深兹眷言情伊余雖寡慰殷憂暫為輕牽率酬嘉藻長揖愧吾生虚谷曰七韻惟四句佳夕霽風氣涼閒房有餘清開軒滅華燭月露皓已盈以下不工此詩荅靈運愁霖詩也文選於忽獲愁霖唱下注云靈運愁霖詩序云示從兄宣逺今所謂五言集靈運集已亡不可考於安城荅靈運一首謝宣逺條繁林彌蔚波清源愈濬華宗誕吾秀之子紹前𦙍綢繆結風徽煙煴吐芳訊鴻漸隨事變雲臺與年峻華萼相光飾嚶嚶悦同響親親子敦余賢賢吾爾賞比景後鮮輝方年一日長萎葉愛榮條涸流好河廣殉業謝成操復禮愧貧樂幸㑹果代畊符守江南曲履運傷荏苒遵塗歎緬邈布懷存所欽我勞一何篤肇允雖同規翻飛各異槩迢遞封畿外窈窕承明内尋塗塗既暌即理理已對絲路有恒悲矧迺在吾愛跬行安步武鎩翮周數仞豈不識髙逺違方徃有吝歳寒霜雪嚴過半路愈峻量已畏友朋勇退不敢進行矣勵令猷冩誠酬來訊虚谷曰文選注靈運贈宣逺序曰從兄宣逺義熙十一年正月作守安城其年夏贈以此詩到其年冬有荅第一章華宗誕吾秀之子紹前𦙍此句典正第二章親親子敦予賢賢吾爾賞亦佳予向在金陵制幕黄制使委考擬試同幕制機夏士林以賢賢吾爾賞為省題詩謂所試之賞也宣逺元意乃謂靈運之厚我親其親也我之賞靈運賢其賢也第四章肇允雖同規翻飛各異槩此所謂兩用者文選注下文窈窕承明内謂靈運為祕書監按此詩靈運當為瑯琊王大司馬行軍參軍永初三年始為永嘉太守元嘉三年始為祕書監則宣逺卒於豫章乆矣第五章有云量已畏友朋勇退不敢進亦佳宣逺惡其弟宣明之盛始終有常退志然宣明坐誅併及兄弟之子則宣逺有子亦不免也哀哉西陵遇風獻康樂一首謝惠連我行指孟春春仲尚未發趣途逺有期念離情無歇成装候良辰漾舟陶嘉月瞻塗意少悰還顧情多闕哲兄感仳别相送越坰林飲餞野亭館分袂澄湖隂悽悽畱子言眷眷浮客心迴塘隠臚栧逺望絶形音靡靡即長路戚戚抱遥悲悲遥但自弭路長當語誰行行道轉逺去去情彌遲昨發浦陽汭今宿浙江湄屯雲蔽曽嶺驚風涌飛流零雨潤墳澤落雪灑林丘浮氛晦崖巘積素惑原疇曲汜薄停旅通川絶行舟臨津不得濟佇檝阻風波蕭條洲渚際氣色少諧和西瞻興遊歎東睇起悽歌積憤成疢痗無萱将如何虚谷曰五章章八句僅有四句佳積素惑原疇惑字佳餘多譫諄靈運荅此詩殊勝也還舊園作見顔范二中書一首謝靈運辭滿豈多秩謝病不待年偶與張邴合乆欲還東山聖靈昔迴眷微尚不及宣何意衝飈激烈火縱炎煙焚玉發崐峯餘燎遂見遷投沙理既迫如邛願亦愆長與懽愛别永絶平生縁浮舟千仞壑總轡萬尋巓流沬不足險石林豈為艱閩中安可處日夜念歸旋事躓兩如直心愜三避賢託身青雲上棲巖挹飛泉盛明盪氛昏貞休康屯邅殊方感成貸微物豫采甄感深操不固質弱易扳纒曽是反昔園語徃實款然曩基即先築故池不更穿果木有舊行壤石無逺延雖非休憩地聊取永日閒衛生自有經息隂謝所牽夫子照情素探懷授徃篇虚谷曰此詩二十一韻初兩韻引張邴事為柱次五韻先言武帝舊眷而徐傅廢弑因以見黜次五韻言自永嘉郡得歸賈誼投沙馬卿如邛史魚兩如直孫叔敖三避賢皆善用事盛明盪氛昏以下四韻言文帝擢為祕書監今乃酬素欵而還故園也曩基即先築故池不更穿果木有舊行壤石無逺延當是永嘉歸始寧時宅墅之役大盛已招物論故誓不再行増廣也後三韻平平繳尾然終有伐山開逕不自收斂之悔何邪登臨海嶠初發彊中作與從弟惠連見羊何共和之一首謝靈運杪秋尋逺山山逺行不近與子别山阿含酸赴修畛中流袂就判欲去情不忍顧望脰未悁汀曲舟己隠隠汀絶望舟騖棹逐驚流欲抑一生歡并奔千里遊日落當棲薄繋䌫臨江樓豈惟夕情歛憶爾共淹畱淹畱昔時歡復増今日歎兹情已分慮况迺協悲端秋泉鳴北澗哀猿響南巒戚戚新别心悽悽乆念攢攢念攻别心旦發清溪隂暝投剡中宿明登天姥岑髙髙入雲霓還期那可尋儻遇浮丘公長絶子徽音虚谷曰此當是四章章四韻而文選不注羊何共和之實李白首用為詩後人多用謂羊璿之何敬瑜也含酸赴修畛謂長路也作軫非顧望脰未悁悁字當作㾓陸彦聲詩曰相思心既勞相望脰亦悁謂引頸以望未勞而身已隠也列仙傳王子喬好吹笙道人浮㐀公接以上嵩山末句用此事殆亦戲言萬一遇仙飛舉則與惠連永絶音問也酬從弟惠連一首謝靈運寢瘵謝人徒滅迹入雲峯巖壑寓耳目歡愛隔音容永絶賞心望長懷莫與同末路值令弟開顔披心胷心胷既云披意得咸在斯淩澗尋我室散帙問所知夕慮曉月流朝忌曛日馳悟對無厭歇聚散成分離分離别西川逥景歸東山别時悲已甚别後情更延傾想遲嘉音果枉濟江篇辛勤風波事欵曲洲渚言洲渚既淹時風波子行遲務協華京想詎存空谷期猶復惠來章祇足攪余思儻若果歸言共陶暮春時暮春雖未交仲春善遊遨山桃發紅萼野蕨漸紫苞鳴嚶已悦豫幽居猶鬱陶夢寐佇歸舟釋我吝與勞虚谷曰惠連五章已評在後詳此乃是惠連訪靈運於始寧山居别去将徃都下至西興阻風以詩來寄而靈運荅也一筆冩就如書問直道情愫既委曲又流麗贈王太常一首顔延年玉水記方流琁源載圓折蓄寳每希聲雖祕猶彰徹聆龍􅕉九泉聞鳯窺丹穴厯聽豈多工唯然覯世哲舒文廣國華敷言逺朝列德輝灼邦懋芳風被鄉老至側同幽人居郊扉常晝閉林閭時晏開亟迴長者轍庭昏見野隂山明望松雪静惟浹羣化徂生入窮節豫徃誠歡歇悲來非樂闋屬美謝繁翰遙懷具短札虚谷曰此詩十二韻玉水記方流璇源載圓折事出尸子凡水其方折者有玉其圓折者有珠舒文廣國華敷言逺朝列徳輝灼邦懋芳風被鄉耋此稱王僧達側同幽人居郊扉常晝閉林閭時晏開亟囬長者轍此四句謂僧達來訪然錯綜互對古未見之昔也郊扉常晝閉以側同幽人居也今也林閭時晏開以亟囬長者轍也庭昏見野隂山明望松雪延之自述所居下一句始自然夏夜呈從兄散騎車長沙一首顔延年炎天方埃鬱暑晏闋塵紛獨静闕偶坐臨堂對星分側聽風薄木遙睇月開雲夜蟬當夏急隂蟲先秋聞歲候初過半荃蕙豈乆芬屏居惻物變慕類抱情殷九逝非空思七襄無成文虚谷曰此詩七韻夜蟬當夏急隂蟲先秋聞歲候初過半荃蕙豈乆芬四句可書隂蟲一句尤佳文選注五言集曰從兄散騎字敬宗車長沙字仲逺今不知其名直東宫荅鄭尚書一首顔延年皇居體環極設險祇天工兩闈阻通軌對禁限清風跂予旅東館徒歌屬南墉寢興鬱無已起觀辰漢中流雲藹青闕皓月鑒丹宫踟蹰清防密徙倚恒漏窮君子吐芳訊感物惻余衷惜無丘園秀景行彼髙松知言有誠貫美價難克充何以銘嘉貺言樹絲與桐虚谷曰此詩十韻惟流雲藹青闕皓月鑒丹宫一言東宫一言中臺齊整他皆可及文選注鄭鮮之字道子和謝監靈運一首顔延年弱植慕端操窘步懼先迷寡立非擇方刻意藉窮棲伊昔遘多幸秉筆侍兩閨雖慙丹雘施未謂𤣥素睽徒遭良時詖王道奄昏霾人神幽明絶朋好雲雨乖弔屈汀洲浦謁帝蒼山蹊倚巖聽緒風攀林結畱荑跂予間衡嶠曷月瞻秦稽皇聖昭天徳豐澤振沉泥惜無爵雉化何用充海淮去國還故里幽門樹蓬藜采茨葺昔宇翦棘開舊畦物謝時既晏年徃志不偕親仁敷情昵興玩究辭棲芬馥歇蘭若清越奪琳珪盡言非報章聊用布所懷虚谷曰延之元嘉三年徴為中書侍郎靈運徴為祕書監其先二人俱為廬陵王義眞所昵髙祖崩少帝立徐羨之等屏二人出為始安永嘉太守在永初三年秋景平元年秋靈運謝病歸㑹稽至是徐傅既誅文帝召用延之自始安還朝至此贈荅延之詩用事用字皆有來厯謂如弱植則子産語其君弱植端操則楚辭内惟省以端操窘步則楚辭夫惟㨗徑以窘步先迷則易先迷失道寡立出荀子刻意出莊子擇方窮棲無全出處方字棲字經傳皆有之此用字之法學者不可不知也此四句延之自謂也伊昔以下四句言向來立朝兩閨謂東宫尚書省丹雘以喻君恩𤣥素以喻已節徒遭以下四句言少帝昏亂衣冠乖阻弔屈以下六句言出為逺郡在湘思越有懷靈運跂予曷月字摘毛詩用之尤雅皇聖以下四句言文帝召用慚已無補去國以下六句言解郡還家補葺舊隠有遲暮之歎親仁以下四句稱靈運贈詩歇奪二字俱佳尾句謂盡言非報章自揆不足以敵靈運故曰非報章此詩凡七八折鋪叙非不整矣用事用字非不密矣以鮑昭之説裁之則謂之雕繢滿眼可也如靈運詩昏旦變氣候山水含清暉清暉能娯人遊子澹忘歸天趣流動言有盡而意無窮似此之類恐延之未敢到也如桃李春風一盃酒江湖夜雨十年燈未是山谷竒處石吾甚愛之勿遣牛礪角牛礪角尚可牛鬬殘我竹乃山谷竒處也學者學選詩近世無其人惟趙汝譡近三謝猶有甃砌之迹而失於舒緩步步規隨無變化之妙云郡内髙齋閒坐荅吕法曹一首謝𤣥暉結構何迢遰曠望極髙深窻中列逺岫庭際俯喬林日出衆鳥散山暝孤猿吟已有池土酌復此風中琴非君美無度孰為勞寸心惠而能好我問以瑤華音若遺金門步就見玉山岑虚谷曰郡宣城郡也栁子厚詩曰遙憐郡齋好謝守但臨牕用牕中列逺岫事也或以為岫本訓穴謝宣城誤用此字予以為雲無心而出岫若專言穴則淵明之意不亦狹乎山谷嘗用之牕中逺岫是眉黛席上橊花皆舞裙山有巗有穴以岫為逺山似亦無害問以瑤華音問餽遺也左傳問以弓詩雜佩以問之金門言宫省玉山言隠處一出揚雄解嘲一出穆天子傳在郡卧病呈沈尚書一首謝𤣥暉淮陽股肱守髙卧猶在兹况復南山曲何異幽棲時連隂盛農節臺笠聚東菑髙閣常晝掩荒堦少諍辭珍簟清夏室輕扇動涼颸嘉魴聊可薦渌蟻方獨持夏李沉朱實秋藕折輕絲良辰竟何許夙昔夢佳期坐嘯徒可積為邦歲已朞絃歌終莫取撫几令自嗤虚谷曰起句二韻謂卧病治郡如汲黯不異棲隠以下十句叙事述景又若誇太守之樂然下文乃云良辰竟何許夙昔夢佳期此十字乃是見約自東陽太守入為尚書意欲約引已入朝也其曰為邦歲已朞則補郡合在鬱林王昭業之隆昌元年七月被弑海陵王昭文立改為延興元年十月明帝鸞立又改為建武元年約之為吏部出東陽亦恐與眺同時而約先入也蹔使下都夜發新林至京邑贈西府同僚一首謝𤣥暉大江流日夜客心悲未央徒念闗山近終知反路長秋河曙耿耿寒渚夜蒼蒼引領見京室宫雉正相望金波麗鳷鵲玉繩低建章驅車鼎門外思見昭丘陽馳暉不可接何况隔兩鄉風雲有鳥路江漢限無梁常恐鷹隼擊時菊委嚴霜寄言罻羅者寥廓已髙翔虚谷曰南史謂王秀之欲以啟聞眺知之因事求還寄此詩味尾句誠若得逺引之義然以江陵為京室金波麗鳷鵲玉繩低建章兩句豐麗用之子隆則諸侯王也亦得用人主宫殿事乎酬王晉安一首謝𤣥暉梢梢枝早勁塗塗露晩晞南中榮橘柚寧知鴻雁飛拂霧朝清閣日旰坐彤闈悵望一塗阻參差百慮依春草秋更緑公子未西歸誰能乆京洛緇塵染素衣虚谷曰晉安郡今泉州故云南中榮橘柚寧知鴻雁飛青閣恐當作青閤眺自謂朝趍東宫王府之類文選注王晉安名徳元公子未西歸謂晉安緇塵染素衣眺亦欲出外也文選顔鮑謝詩評巻二考證第八頁前三行案惑原疇今文選本或作盛亦可通
