body:
  text: 文選顔鮑謝詩評巻一元方回撰述徳述祖徳詩二首謝靈運達人貴自我髙情屬天雲兼抱濟物性而不纓垢氛段生蕃魏國展季救魯人弦髙犒晉師仲連却秦軍臨組乍不緤對珪寧肯分恵物辭所賞勵志故絶人苕苕歴千載遥遥播清塵清塵竟誰嗣明哲時經綸委講綴道論改服康世屯屯難既云康尊主隆斯民虚谷曰靈運之意似謂乃祖功大賞薄立此髙論太元八年十一月謝𤣥破苻堅謝石為大都督𤣥為前鋒都督蓋禆帥也劉牢之謝琰功亦亞𤣥明年二月桓冲卒朝議欲以𤣥為荆江二州刺史謝安自以父子名位太盛又懼桓氏失職怨望乃以桓石民為荆州桓石䖍為豫州桓伊為江州而𤣥亦為徐兖二州刺史晉之州刺史如漢之州牧而帶都督軍事統十數郡猶近世制置使宣撫使而權尤重可以自殺郡守入則為相位不輕也靈運此詩似是虚言中原昔䘮亂䘮亂豈解已崩騰永嘉末逼廹太元始河外無反正江介有䠞圮萬邦咸震懾横流賴君子拯溺由道情龕暴資神理秦趙欣來蘇燕魏遲文軌賢相謝世運逺圖因事止髙揖七州外拂衣五湖裏随山疏濬潭傍巖藝枌梓遺情捨塵物貞觀丘壑美虚谷曰太元九年八月謝太保安奏請乗苻氏傾敗開拓中原以徐兖二州刺史謝𤣥為前鋒都督帥豫州刺史桓石䖍等伐秦𤣥至下邳秦徐州刺史趙遷棄彭城走𤣥進據彭城九月彭城内史劉牢之進據鄄城鄄玉縁切濮陽郡之邑屬兖州河南城堡皆來歸附太保安自求北征加都督揚江等十五州諸軍事𤣥遣晉陵太守滕恬之渡江據黎陽朝廷以兖青司豫既平加𤣥都督徐兖青司冀幽并七州諸軍事十二月劉牢之據碻磝滑臺苻丕請救𤣥遣牢之以兵二萬救鄴饋米二千斛十年四月牢之為慕容垂所敗自鄴徵還㑹稽王道子好専權與太保安有隙安出鎮廣陵避之築来城八月以疾還建康卒道子以司徒瑯琊王領揚州刺史録尚書都督中外諸軍事尚書令謝石為衛將軍十一年三月黎陽翟遼太山張願叛𤣥還淮隂十二年正月以朱序為青兖二州刺史代𤣥鎮彭城序求鎮淮隂以𤣥為㑹稽内史十三年正月康樂獻武公謝𤣥卒十二月南康襄公謝石卒靈運第二詩蓋專賦此事本末賢相謝世運謂安之歿也逺圖因事止謂瑯琊王道子與安不協也然亦孝武以昏主嗜酒色無逺畧委事道子此所以當中原潰亂可乗之機以謝安為相𤣥石牢之為將而無所成也靈運詩但稱乃祖髙蹈之節恐非康公本心也文選注髙揖七州外謂舜分天下為十二州時晉有七州故云七州予獨謂不然指康樂所解徐兖青司冀幽并七州都督耳謂晉有七州而髙揖于其外則不復居晉之土耶非也道子解𤣥七州都督而為㑹稽内史釋兵柄于内郡自是左遷然𤣥亦嘗疾篤詔還京口𤣥不以為怨而靈運微有怨辭蓋以已之不得朝柄為望耳公讌九日從公戲馬臺集送孔令詩一首謝宣逺風至授寒服霜降休百工繁林收陽彩宻苑解華叢巢幕無留燕遵渚有來鴻輕霞冠秋日迅商薄清穹聖心眷嘉節揚鑾戾行宫四筵霑芳醴中堂起絲桐扶光迫西汜歡餘宴有窮逝矣將歸客養素克有終臨流怨莫從歡心歎飛蓬虚谷曰宋國建無晉君矣故二謝詩皆有聖心之語易曰謙亨君子有終吉養素之句用此佳九日從宋公戲馬臺集送孔令詩一首謝靈運季秋邉朔苦旅鴈違霜雪凄凄陽卉腓皎皎寒潭潔良辰感聖心雲旗興暮節鳴葭戾朱宫蘭巵獻時哲餞宴光有孚和樂隆所缺在宥天下理吹萬羣方悦歸客遂海嵎脱冠謝朝列弭棹薄枉道指景待樂闋河流有急瀾浮驂無緩轍豈伊川途念宿心愧將别彼美丘園道喟焉傷薄劣虚谷曰當時賦詩推謝瞻宣逺詩為冠所謂巢幕無留燕遵渚有來鴻者也宣逺詩有云聖心眷嘉節靈運詩亦云良辰感聖心宋臺既建坐受九錫則裕為君而晉安帝已非君矣故二謝皆以聖稱宋公然猶立恭帝改元元熈至二年六月而後禪使裕脱有王敦桓温之死以聖心為詩者能無患乎易曰有孚飲酒无咎詩序曰鹿鳴廢則和樂缺矣此詩云餞宴光有孚和樂隆所缺善用事又善用韻建安詩則不如此之細而必偶也在宥吹萬用莊子語明已尊宋公為聖人造化以其許孔靖之歸得寛宥天下生養萬物之意文選注腓音肥詩百卉具腓毛萇曰痱病也今本作腓字非韓詩薛君曰腓變也俱變而黄也鳴葭當作鳴笳孔靖南史有傳㑹稽山隂人據傳靖晝臥有神人謂曰起天子在門出見乃劉裕靖因結交以身為托蓋裕之私人若他人也豈敢于宋臺初建而辭尚書令乎此不足為髙祖餞王撫軍庾西陽集别時為豫章太守庾被徵還東一首謝宣逺祇召旋北京守官反南服方舟析舊知對筵曠明牧舉觴矜飲餞指途念出宿來晨無定端别晷有成速頹陽照通津夕隂曖平陸榜人理行艫輶軒命歸僕分手東城闉發棹西江隩離㑹雖相親逝川豈往復誰謂情可書盡言非尺牘虚谷曰此詩無甚佳處江左自上流趨建康則云北京蓋江流大抵北向也江自南趨北而曰江南江北言大勢也其實北向而江分東西岸焉今鄂州西門對漢陽軍江州西門出琵琶亭而出東門皆不見江故知江不東向而北向故江之上水船必用北風也瞻避弟晦權盛求守豫章卒元嘉三年晦以荆州刺史見討被誅謝䂃謝遯及晦兄弟之子並死一人可以禍一家雖宣逺之出無救于後來如此鄰里相送方山詩一首謝靈運祇役出皇邑相期憩甌越解纜及流潮懐舊不能發析析就衰林皎皎明秋月含情易為盈遇物難可歇積痾謝生慮寡欲罕所闕資此永幽棲豈伊年嵗别各勉日新志音塵慰寂蔑虚谷曰懐舊不能發謂義真延之慧琳也晉以來士大夫喜讀易老莊而不知謙益止足之義率多懐才負氣求逞于澆漓衰亂之世箕潁枕潄設為虚談義真之昵靈運雖未必果有用為宰相之言史或難信然靈運之為人非靜退者徐羡之傅亮排黜蓋其自取懐舊不能發有不樂為郡之意資此永幽栖亦一時憤激之語耳羡之等廢少帝殺義真自貽灰滅義真之死亦自不晦斂靈運又終身不自悔艾其敗也詩意已可覘云新亭渚别范零陵詩一首謝𤣥暉洞庭張樂地瀟湘帝子逰雲去蒼梧野水還江漢流停驂我悵望輟棹子夷猶廣平聽方籍茂陵將見求心事俱已矣江上徒離憂虚谷曰自洞庭張樂地以下六句言湖湘間諸郡范去而已思之也廣平聽方籍謂范也茂陵將見求謂已也王隠晉書鄭袤字林叔為中郎散騎常侍㑹廣平太守闕宣帝謂袤曰賢叔大匠渾垂稱于平陽魏郡蒙惠化且盧子家王子邕繼踵此郡欲使世不乏賢故復相屈在郡袤父泰字公業所謂鄭公業為不亡泰始中終辭司空者此廣平事比汲黯淮陽事而世人罕用司馬相如病免家居茂陵故朓以自謂蓋言范之聲譽方籍甚已則當求諸閒退之地也心事俱已矣必自有説不傳之秘非所形容味雲去蒼梧野之句暗用舜殂落事得非以齊主為喻乎詠史張子房詩謝宣逺王風哀以思周道蕩無章卜洛易隆替興亂罔不亡力政吞九鼎苛慝暴三殤息肩纒民思靈鑒集朱光伊人感代工聿來扶興王婉婉幙中畫輝輝天業昌鴻門消薄蝕垓下殞攙搶爵仇建蕭宰定都䕶儲皇肇允契幽叟翻飛指帝鄉恵心奮千祀清埃播無疆神武睦三正裁成被八荒明兩燭河隂慶霄薄汾陽鑾旍歴頽寢飾像薦嘉嘗聖心豈徒甄惟徳在無忘逝者如可作揆子慕周行濟濟屬車士粲粲翰墨場瞽夫違盛觀竦踊企一方四達雖平直蹇步愧無良飡和忘微逺延首詠太康虚谷曰劉裕義熈十三年舟師至項城逰張良廟僚佐賦詩瞻為冠第一韻王風哀以思周道蕩無章以言周之衰第三韻力政吞九鼎苛慝暴三殤以言秦之暴東坡詆五臣誤注三殤其實乃是李善第五韻至第十韻叙美子房婉婉幕中盡一句世多用之鴻門銷薄蝕垓下殞攙搶爵仇建蕭宰定都䕶儲皇肇允契幽叟翻飛指帝鄉皆佳肇允翻飛瞻詩兩用此語第十一韻至第十四韻歸美劉裕首曰神武睦三正又曰明兩燭河隂慶霄薄汾陽河隂汾陽堯舜所居諛裕至矣又曰聖心豈徒甄不待明年九日集于戲馬而稱聖也裕之奪晉而自君也乆矣後五韻惟四達雖平直蹇步愧無良佳他平平秋胡詩一首顔延年椅梧傾髙鳳寒谷待鳴律影響豈不懐自逺毎相匹婉彼幽閑女作嬪君子室峻節貫秋霜明豔侔朝日嘉運既我從欣願自此畢燕居未及好良人顧有違脱巾千里外結綬登王畿戒徒在昧旦左右來相依驅車出郊郭行路正威遲存為乆離别沒為長不歸嗟余怨行役三陟窮晨暮嚴駕越風寒解鞍犯霜露原隰多悲凉廻飈巻髙樹離獸起荒蹊驚鳥從横去悲哉逰宦子勞此山川路超遥行人逺宛轉年運徂良時為此别日月方向除孰知寒暑積僶俛見榮枯嵗暮臨空房凉風起座隅寢興日已寒白露生庭蕪勤役從歸願反路遵山河昔辭秋未素今也嵗載華蠶月觀時暇桑野多經過佳人從所務窈窕援髙柯傾城誰不顧弭節停中阿年往誠思勞事逺濶音形雖為五載别相與昧平生捨車遵往路鳬藻馳目成南金豈不重聊自意所輕義心多苦調宻此金玉聲髙節難乆淹朅來空復辭遲遲前途盡依依造門基上堂拜嘉慶入室問何之日暮行来歸物色桑榆時美人望昏至慙歎前相持有懐誰能己聊用申苦難離居殊年載一别阻河闗春來無時豫秋至恒早寒明發動愁心閨中起長歎慘悽嵗方晏日落逰子顔髙張生絶弦聲急由調起自昔枉光塵結言固終始如何乆為别百行諐諸已君子失明義誰與偕没齒愧彼行露詩甘之長川汜虚谷曰此詩九章章十句頗傷于多陶淵明賦桃源三良荆軻何其簡而明也然此亦善鋪叙存為乆離别沒為長不歸犯蘇子卿語却用得好三陟窮晨暮謂陟彼髙岡陟彼崔嵬陟彼砠矣三陟字頗巧原隰多悲凉以下四句嵗暮臨空房以下四句頗有建安風味他所㸃者皆可雋永詩長篇為難九折更端則不難矣此詩及五君詠顔詩之最也李善文選注東坡之所深許無一事不見本根無一字不見來歴皆博極羣書間亦有随文釋義者且如此詩脱巾千里外結綬登王畿注云巾處士所服綬仕者所佩今欲宦于陳故脱巾而結綬也能盡巾綬之義極佳又引東觀漢記江革養母幅巾及漢書蕭朱結綬事可謂詳細然秋胡之仕于陳止是魯之隣國而云王畿恐顔延之一時寓言雖以秋胡子為題亦汎言仕宦之意其注乃引詩緯曰陳王者所起也此意似頗未通戒徒在昧旦注引易歸藏曰君子戒車小人戒徒李善時尚有易歸藏也自昔枉光塵結言固終始下五字亦作尋常看觀注乃知用公羊語結言而退又楚詞解佩纕以結言周易歸妹人之終始前賢遣語不妄如此髙張生絶絃聲急由調起注上句喻立朝期于効命下句喻興于恨深余謂此意謂有所激者必出于不平耳五君詠顔延年阮步兵阮公雖淪跡識宻鑒亦洞沈醉似埋照寓辭類託諷長嘯若懐人越禮自驚衆物故不可論途窮能無慟嵇中散中散不偶世本自餐霞人形解驗黙仙吐論知凝神立俗迕流議尋山洽隠淪鸞翮有時鎩龍性誰能馴劉參軍劉伶善閉闗懐情滅聞見鼓鐘不足歡榮色豈能眩韜精日沈飲誰知非荒宴頌酒雖短章深衷自此見阮始平仲容青雲噐實禀生民秀達音何用深識微在金奏郭奕已心醉山公非虚覯屢薦不入官一麾乃出守向常侍向秀甘淡薄深心託豪素探道好淵𤣥觀書鄙章句交吕既鴻軒攀嵇亦鳳舉流連河裏逰惻愴山陽賦虚谷曰沈約宋書顔延之領步兵好酒踈誕劉湛言于廬陵王義康出為永嘉太守延之作五君詠以述竹林七賢山濤王戎以貴顯被黜詠嵇康曰鸞翮有時鎩龍性誰能馴詠阮籍曰物故不可論途窮能無慟詠阮咸曰屢薦不入官一麾乃出守詠劉伶曰韜精日沉飲誰知非荒宴此四句蓋自序也詠史詩一首鮑明逺五都矜財雄三川養聲利百金不市死明經有髙位京城十二衢飛甍各鱗次仕子彯華纓逰客竦輕轡明星辰未稀軒葢已雲至賓御紛䬃沓鞍馬光照地寒暑在一時繁華及春媚君平獨寂寞身世兩相弃虚谷曰此詩八韻以七韻言繁盛之如彼以一韻言寂寞之如此左太冲詠史第四首亦八韻前四韻言京城之豪侈後四韻言子雲之貧樂蓋一意也明逺多為不得志之辭憫夫寒士下僚之不達而惡夫逐物奔利者之苟賤無恥毎篇必致意于斯唐以來詩人多有此體李白陳子昂集中可攷而近代劉屏山為五言古詩亦出于此參以建安體法五都王莽立均官雒陽邯鄲臨淄宛成都也三川周京河洛伊也言都㑹處千金之子不死于市陶朱公語明經取青紫夏侯勝語此四句起柱也入京城十二衢則専言長安矣君平獨寂寞身世兩相棄明逺以自歎也文選謂身棄世而不仕世棄身而不任此語至佳㳺覽逰西池一首謝叔源悟彼蟋蟀唱信此勞者歌有來豈不疾良㳺常蹉􅋸逍遥越城肆願言屢經過迴阡被陵闕髙臺眺飛霞恵風蕩繁囿白雲屯曽阿景昃鳴禽集水木湛清華褰裳順蘭芷徙倚引芳柯美人愆嵗月遲暮獨如何無為牽所思南榮戒其多虚谷曰起句十字亦佳毛詩蟋蟀在堂嵗聿云莫今我不樂日月其除此所謂悟也韓詩伐木勞者歌其事此所謂信也有來謂將來之年也選注引陸雲嵗暮賦云年有來而棄予此西池之逰所以惟恐其失之也髙臺眺飛霞水木湛清華兩句俱佳美人愆嵗月所思也庚桑楚謂南榮趎無使汝思慮營營引此以言且復行樂不必牽于思而過甚也意是而語頗拙耳泛湖歸出樓中翫月一首謝恵連日落泛澄瀛星羅㳺輕橈憩榭面曲汜臨流對廻潮輟䇿共駢筵並坐相招要哀鴻鳴沙渚悲猨響山椒亭亭映江月瀏瀏出谷飈斐斐氣幂岫泫泫露盈條近矚袪幽藴逺視盪諠囂晤言不知罷從夕至清朝虚谷曰王逸注楚辭倚沼畦瀛兮遥望博楚人名池澤中為瀛爾雅江决出復入為汜毛詩注可與晤言晤對也此悟字與晤同恵連少年工詩文此篇十六句之内十二句對偶親的綺靡細潤然言景不可以無情必有近矚窺幽藴逺視盪諠囂及末句乃成好詩若靈運則尤情多于景而為謝氏詩之冠散義勝偶句叙情勝述景能如是者建安可近矣從㳺京口北固應詔一首謝靈運玉璽戒誠信黄屋示崇髙事為名教用道以神理超昔聞汾水逰今見塵外鑣鳴笳發春渚税鑾登山椒張組眺倒景列筵矚歸潮逺巖映蘭薄白日麗江臯原隰荑緑栁墟囿散紅桃皇心美陽澤萬象咸光昭顧已枉維縶撫志慙場苗工拙各所宜終以反林巢曽是縈舊想覽物奏長謡虚谷曰水經注京口丹徒之西鄉西北有别嶺入江三面臨水髙十數丈號曰北固今鎮江府猶有北固樓詩家絶景靈運出為永嘉太守滿嵗謝病去職元嘉三年既誅徐羡之傅亮謝晦徵靈運為秘書監顔延之為中書侍郎四年文帝如丹徒謁京陵靈運以其秘書監從故有應詔之作靈運若曰玉以為璽所以戒誠信黄以為屋所以示崇髙聖人非以此為富且貴也此二事為名教之用耳推言之則玉帛鐘鼓禮樂之事也有道焉以神理超乎形迹之外則聖人所以制天下者也用此四句為柱引入黄帝藐姑射汾水之㳺以譬北固之讌有老莊放逸意何不用虞廵守夏游豫事邪自昔聞汾水㳺以至墟囿散紅桃皆不過叙事述景如白日麗江臯佳句也老杜之遲日江山麗出于此原隰荑緑栁一聨艷而過于工建安詩豈有是哉皇心美陽澤以下八句言主上過于春陽之澤物而已之拙不克工慙于場駒之維縶終願閒退方見議論然作應詔詩自來難作如此已為佳也倒景有兩説神仙家以日月皆在其下謂之凌倒景今以山臨水而影倒謂之眺倒景孫綽天台山賦或倒景于重溟晩出西射堂一首謝靈運步出西掖門遥望城西岑連障疊巘崿青翠杳深沈曉霜楓葉丹夕曛嵐氣隂節往慼不淺感來念已深羈雌戀舊侣迷鳥懐故林含情尚勞愛如何離賞心撫鏡華緇鬢攬帶緩促衿安排徒空言幽獨賴鳴琴虚谷曰文選注永嘉郡射堂予謂自西射堂出西城門也起句十字蓋古體曉霜楓葉丹與池塘生春草皆名佳句以其自然也節往慼不淺感來念已深靈運多有此句法感物而必及于情人理之常也不樂為郡而懐賞心之人至于撫鏡攬帶恨夫鬢之老衣之寛則何其戚戚之甚邪安排莊子語郭象注謂安于推移此則謂安于世運之推移徒有空言不如寄于琴書足以冩幽獨之無聊也意深逺而心惻愴豈真恬于道者哉登池上樓一首謝靈運潛虬媚幽姿飛鴻響逺音薄霄愧雲浮棲川怍淵沈進徳智所拙退耕力不任徇禄反窮海卧痾對空林傾耳聆波瀾舉目眺嶇􅋂初景革緒風新陽改故隂池塘生春草園栁變鳴禽祁祁傷豳歌萋萋感楚吟索居易永乆離羣難處心持操豈獨古無悶徵在今虚谷曰池上樓永嘉郡樓此詩句句佳鏗鏘瀏亮合是靈運第一等詩潜虬飛鴻深潜髙舉虚設二喻而謂已不能雲浮川沈有所媿此詩體之變也進徳智所拙退耕力不任詩不可無此等語又以四句紀事言情又以四句賦早春時物不特池塘生春草為佳句園栁變嗚禽及初景革緒風新陽改故隂亦佳句也謂春之初日革冬之餘風春為陽冬為隂亦謂以春改冬也傷豳歌之祁祁感楚吟之萋萋欲歸而從田也索居離羣又所以極言夫所思之人也惟無悶徵在今一句有病義真之廢固徐傅之無上靈運之出猶得守郡本亦自取以為遯世無悶則欺心矣史靈運于永嘉西堂思詩竟日不就忽夢見恵連即得池塘生春草大以為工常云此語有神助非吾語也按此句之工不以字眼不以句律亦無甚深意奥㫖如古詩及建安諸子明月照髙樓髙臺多悲風及靈運之曉霜楓葉丹皆天然混成學者當以是求之逰南亭一首謝靈運時竟夕澄霽雲歸日西馳宻林含餘清逺峯隠半規乆痗昬墊苦旅館眺郊岐澤蘭漸被徑芙蓉始發池未厭青春好已觀朱明移慼慼感物歎星星白髪垂藥餌情所止衰疾忽在斯逝將候秋水息景偃舊崖我志誰與亮賞心惟良知虚谷曰永嘉郡南亭也按靈運詩永初三年七月十六日之郡在郡凡一年隣里相送方山詩曰皎皎明秋月此赴郡之始在少帝即位未改元之前也西射堂詩曰曉霜楓葉丹則在郡見冬矣池上樓詩曰池塘生春草則在郡見春矣乃此夏雨喜霽之作思欲見秋而歸也其歸當在景平元年秋景平二年五月少帝廢八月文帝即位改為元嘉元年所謂賞心惟良知必指從弟恵連及何敬瑜羊璿之之流耳三年始徵為秘書監逰赤石進帆海一首謝靈運首夏猶清和芳草亦未歇水宿淹晨暮隂霞屢興沒周覽倦瀛壖况乃凌窮髪川后時安流天吴靜不發揚帆采石華挂席拾海月溟漲無端倪虚舟有超越仲連輕齊組子牟眷魏闕矜名道不足適已物可忽請附任公言終然謝夭伐虚谷曰首夏猶清和至今以為名言瀛壖海之邊岸也南極海中有窮髪之人天吴水伯也其獸八首八足八尾背黄青石華海月皆海中可食之物揚帆挂席古詩未尚大巧故不嫌異辭而同義猶前詩用媿對怍也仲連輕齊組子牟眷魏闕文選注謂仲輕齊組而至海上明海上可悦既悦海上恐有輕朝廷之譏故云子牟眷魏闕予謂靈運意不然其意乃是雙舉仲連子牟一是而一非之矜名者道不足名固不可矜也適已者物可忽忽字未安以富貴為外物而忽之可也以物為人物之物但知適已而忽物則不可也適已之説史記謂莊子也晉宋間人老莊之學終有偏處靈運之病正在于恣已自適輕忽人物耳任公言亦出莊子謂孔子圍于陳大公任往弔之曰直木先伐甘泉先竭其意者飾智以矜愚云云故不免也此寓言不足憑靈運所以不能謝夭伐者豈非于聖門之學有所不足哉石壁精舍還湖中作一首謝靈運昏旦變氣候山水含清暉清暉能娱人㳺子憺忘歸出谷日尚早入舟陽已微林壑斂暝色雲霞收夕霏芰荷迭映蔚蒲稗相因依披拂趨南逕愉悦偃東扉慮澹物自輕意愜理無違寄言攝生客試用此道推虚谷曰靈運所以可觀者不在于言景而在于言情慮澹物自輕意愜理無違如此用工同時諸人皆不能逮也至其所言之景如山水含清暉林壑斂暝色及他日天髙秋月明春晩緑野秀于細宻之中時出自然不皆出于織組顔延年鮑明逺沈休文雖各有所長不到此地如石壁地名之類自可看文選注登石門最髙頂一首謝靈運晨䇿尋絶壁夕息在山棲疏峯抗髙館對嶺臨廻溪長林羅户穴積石擁階基連巖覺路塞宻竹使徑迷來人忘新術去子惑故蹊活活夕流駛噭噭夜猨啼沈㝠豈别理守道自不攜心契九秋榦目玩三春荑居常以待終處順故安排惜無同懐客共登青雲梯虚谷曰此詩宻竹使逕迷己似唐詩新序榮啟期曰貧者士之常死者人之終居常待終何憂哉靈運用此全語曰居常以待終恐靈運非貧者也莊子老􅖫死秦失弔之曰適來夫子時也適去夫子順也安排已見前注排者推也能處順故安于造物之推移也然靈運又豈能處順者哉惜無同懐客共登青雲梯靈運毎有賞心之嘆即義真所謂未能忘言于悟賞者然則賞一也有獨賞有共賞靈運思夫共賞者而不可得則以獨賞為憾此尾句之意也亦篇篇致意于斯心契目翫一聨謂内其實而外其華先之以沈㝠守道之説自處髙矣焉得不為俗人所忌於南山往北山經湖中瞻眺一首謝靈運朝旦發陽崖景落憩隂峯舍舟眺迥渚停䇿􅀝茂松側逕既窈窕環洲亦玲瓏俛視喬木杪仰聆大壑灇石横水分流林宻蹊絶蹤解作竟何感升長皆丰容初篁苞緑籜新蒲含紫茸海鷗戲春岸天雞弄和風撫化心無厭覽物眷彌重不惜去人逺但恨莫與同孤逰非情歎賞廢理誰通虚谷曰此詩述事寫景自天雞弄和風以上十六句有入佳句可膾炙然非用撫化覽物一聨以繳之則無議論無歸宿矣此靈運詩髙妙處不惜去人逺謂古人也不惜者深惜之也以獨㳺山中今人無可與同者也孤㳺非情歎賞廢理誰通謂已之獨㳺于此不以真情形之嘆詠則賞心之事之人既廢此理誰與通乎意極哀惋栁子厚永州諸詩多近此陽岸謂南山隂峰謂北山解作謂雷雨升長謂草木用兩卦名為偶建安詩無是也從斤竹澗越嶺溪行一首謝靈運猨鳴誠知曙谷幽光未顯巖下雲方合花上露猶泫逶迤傍隈隩迢遞陟陘峴過澗既厲急登棧亦陵緬川渚屢逕復乗流翫廻轉蘋萍泛沈深菰蒲冒清淺企石挹飛泉攀林摘葉巻想見山阿人薜蘿若在眼握蘭勤徒結折麻心莫展情用賞為美事昧竟誰辨觀此遺物慮一悟得所遣虚谷曰七韻言㳺山之事四韻言情借楚詞山鬼薜蘿語以懐所思之人握蘭折麻將以遺之心徒勤而不展也情用賞為美謂㳺山之情已獨賞矣而無知我心共賞之者則何美之有如此則其事幽昧而無分别者一説謂吾之真情以賞知此山為美事不明顧不暇憂其不察也以此觀之物慮可遺而是非可遣矣然則伐木開逕以致王誘之疑孟顗之奏此詩殆先兆也隩于到于六二切即隈也江東人謂之浦陘胡庭切連山中斷曰陘嶺小髙曰峴賢典切折踈麻兮瑶華將以遺兮離居踈麻神麻也應詔觀北湖田收一首顔延年周御窮轍跡夏載厯山川蓄軫豈明懋善逰皆聖仙帝暉膺順動清蹕廵廣廛樓觀眺豐穎金駕映松山飛奔互流綴緹彀代廻環神行埓浮景爭光溢中天開冬眷徂物殘悴盈化先陽陸團精氣隂谷曳寒煙攅素既森藹積翠亦蔥仟息饗報嘉嵗通急戒無年温渥浹輿隸和恵屬後筵觀風乆有作陳詩愧未妍疲弱謝凌遽取累非纆牽虚谷曰此詩十三韻無可取文選注丹陽郡圖經曰樂㳺苑晉時藥園元嘉中築堤壅水名為北湖集曰元嘉十年也予謂李善時有丹陽郡圖經有顔延之集今皆無之矣詩第二韻曰蓄軫豈明懋善逰皆聖仙注云蓄軫不行豈是欽明懋徳之后善逰天下皆是睿聖神仙之君能通詩意而理則無是也前一韻曰周御窮轍迹夏載厯山川言周穆王夏禹此乃復注曰聖謂夏禹仙謂周穆亦巧車駕幸京口侍逰蒜山作一首顔延年𤣥天髙北列日觀臨東溟入河起陽峽踐華因削成巖險去漢夷衿衛徙吴京流池自化造山闗固神營園縣極方望邑社總地靈宅道炳星緯誕曜應辰明睿思纒故里廵駕市舊坰陟峰騰輦路尋雲抗瑶甍春江壯風濤蘭野茂稊英宣逰𢎞下濟窮逺凝聖情嶽濱有和㑹祥習在卜征周南悲昔老留滯感遺萌空食疲廊肆反税事巖耕虚谷曰此詩十三韻第四韻云池流自化造山闗固神營化造神營四字可用春江壯風濤蘭野茂稊英上一句佳末韻空食疲廊肆反税事巖耕亦平平他皆冗而晦車駕幸京口三月三日侍逰曲阿後湖作一首顔延年虞風載帝狩夏諺頌王逰春方動辰駕望幸傾五州山祇蹕嶠路水若警滄流神御出瑶軫天儀降藻舟萬軸𦙍行衛千翼汎飛浮彤雲麗琁葢祥飈被綵斿江南進荆豔河激獻趙謳金練照海浦笳鼓震溟洲藐盼覯青崖衍漾觀緑疇人靈騫都野鱗翰聳淵丘徳禮既暜洽川嶽徧懐柔虚谷曰此詩十一韻偶句櫛比全無頓挫鮑明逺以鋪錦列繡目之是也本不書此詩書之以見夫雕繢滿眼之詩未可以望謝靈運也山秖之蹕水若之警非不以字為眼瑶軫藻舟又非不麗下句皆爾如無意何人靈騫都野鱗翰聳淵丘文選注謂騫聳皆驚懼之意都野民靈所居淵丘鱗翰所聚予以正文避唐太宗名以民為人其語破碎無意晉陵郡之曲阿縣下陳敏引水為湖四十里號曰曲阿後湖今常州境元嘉二十六年作行藥至城東橋一首鮑明逺雞鳴闗吏起伐鼓早通晨嚴車臨迥陌延瞰歴城闉蔓草縁髙隅修楊夾廣津迅風首旦發平路塞飛塵擾擾逰宦子營營市井人懐金近從利撫劍逺辭親爭先萬里塗各事百年身開芳及稚節含采吝驚春尊賢永照灼孤賤長隠淪容華坐消歇端為誰苦辛虚谷曰此亦不得志詩雞鳴四句昭自叙早行也行藥有二義晉宋間人服寒食散之類服藥矣而㳺行以消息之行藥者老杜詩乗興還來看藥欄蓋行視花草藥物之義亦通蔓草以下叙景述事言早起之人不為仕宦即為井市懐金撫劍近逺不同而同于奔競也故曰爭先萬里途各事百年身下文曰開芳及稚節含采吝驚春文選注吝字殊為費力其説曰草之開芳宜及少節既以含采理惜驚春夫草之驚春花葉必盛盛必有衰固所當惜也又引孔安國尚書傳曰吝惜也虚谷竊謂吝字可疑豈以上文有各事百年身故于此句避各字以為吝字乎以愚見决之當作開芳及稚節含采各驚春為是此蓋有感于行藥之際見夫開芳含采之藥物及乎未老之時而皆有驚春之色以譬夫仕宦撫劍市井懐金之徒然當時之所謂尊而賢者久永光顯吾曹之孤而賤者則終于隠淪坐成衰老為誰而空苦辛也故曰此亦不得志之詩鮑昭詩且未論却于注中得王羲之詩一聨甚佳羲之荅許詢曰爭先非吾事靜照在忘求此語謝靈運未之及也逰東田一首謝𤣥暉戚戚苦無悰攜手共行樂尋雲陟累榭随山望菌閣逺樹曖仟仟生烟紛漠漠魚戲新荷動鳥散餘花落不對芳春酒還望青山郭虚谷曰朓有莊在鍾山故曰㳺東田起句佳逺樹生煙之聨尤佳魚戲新荷動鳥散餘花落佳之尤佳然磔元氣甚矣隂鏗何遜庾信徐陵王褒張正見梁簡文薛道衡諸人詩皆務出此而唐人詩無不襲此等語句靈運恵連在宋永初元嘉間猶未甚也宋六十嵗至于齊而𤣥暉出焉唐子西之論有㫖哉文選顔鮑謝詩評巻一考證十五頁前三行案鸞翮有時鎩据今本文選改原本作鸞翮知有鎩或因當日所見之本不同亦可以備參考三十三頁前一行案各今文選本俱作吝殊難解注亦同方氏改吝為各似有所見存考
