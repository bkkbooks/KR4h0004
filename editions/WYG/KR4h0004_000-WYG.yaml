body:
  text: 文選顔鮑謝詩評總集類提要臣等謹案文選顔鮑謝詩評四巻元方回撰回有續古今考已著録是編取文選所録顔延之鮑照謝靈運謝瞻謝惠連謝朓之詩各為論次諸家書目皆不著録惟永樂大典載之考集中顔延之三月三日侍游曲阿後湖作一首評曰本不書此詩書之以見夫彫繢滿眼之詩未可以望謝靈運也又北使洛一首評曰所以書此詩者有二又謝靈運擬鄴中集八首評曰規行矩步甃砌粧㸃而成無可圈㸃故余評其詩而不書其全篇案此本八首皆書全篇與此評不合葢不載本詩則所評無可繫屬故後人又為補錄也則此集葢回手書之册後人得其墨迹録之成帙也回所撰瀛奎律髓持論頗偏此集所評如謝靈運詩多取其能作理語又好標一字為句眼仍不出宋人窠臼然其他則多中理解又如謝靈運述祖徳詩第二首評曰文選註髙揖七州外謂舜分天下為十二州時晉有七州故云七州余謂不然此指謝𤣥所解徐兖青司冀幽并七州都督耳謂晉有七州而揖其外則不復居晉土耶謝瞻張子房詩評曰東坡詆五臣誤註三殤其實乃是李善顔延之秋胡詩評曰秋胡之仕於陳止是魯之鄰國而云王畿恐是延之一時寓言雖以秋胡子為題亦泛言仕宦善註乃引韓曰陳王者所起也此意似頗未通亦間有所考訂至於評謝靈運九日戲馬臺送孔令詩謂鳴葭當作鳴笳則未考晉書夏統傳評鮑照行藥至城東橋詩謂行藥為乗興還來看藥欄之意則悞引杜詩評謝朓郡内髙齋閒坐答吕法曹詩謂或以為岫本訓穴以為逺山亦無害則附㑹陶潜歸去來詞小小舛漏亦所不免要不害其大體統觀全集究較瀛奎律髓為勝殆作於晩年所見又進歟乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4d5bc1c7b7edb2f38f4e3db79baed8042adee90bfae29cce3713d2392afab83e
